# Deployment Targets vocabulary
# Each entry declares a named deployment target that software deployment
# patterns can reference.  status: approved = standard target, proposed = under
# review before ratification, (omitted) = inferred approved.
#
# Geographic targets include lat/lon for the world-map view.
# SaaS and customer-site entries are non-geographic — leave lat/lon absent.

