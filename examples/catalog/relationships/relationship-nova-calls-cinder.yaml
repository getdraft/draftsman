label: attaches block volumes
technology: HTTP (Cinder API)
direction: synchronous
catalogStatus: complete
notes: nova-compute requests volume attachment via cinder-api. Cinder coordinates with the backend storage driver to present the volume to the hypervisor via iSCSI or NFS.
