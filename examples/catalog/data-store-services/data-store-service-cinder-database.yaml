host: STCK00000F-HS0F
primaryTechnologyComponent: STCK00000E-TC0E
architectureNotes:
  serviceAuthentication: Cinder connects to its database schema using a dedicated MariaDB service account with 
    credentials configured in cinder.conf.
  secretsManagement: Database credentials stored in cinder.conf managed by configuration management tooling.
  serviceLogging: MariaDB slow query logs and error logs for the Cinder schema are shipped to the centralised log 
    aggregation platform.
  healthWelfareMonitoring: MariaDB Galera cluster health monitored via wsrep status. Volume operation latency and 
    attachment record counts are tracked as health indicators.
  availabilityModel: Hosted in the 3-node MariaDB Galera cluster. Loss of one node does not interrupt availability.
  scalabilityModel: The Cinder schema grows with the number of volumes and snapshots. Purging of deleted resource 
    records is recommended for large deployments.
  recoverabilityModel: Data recovered from MariaDB Galera replication. Schema migrations applied via cinder-manage db 
    sync. Orphaned volumes on the storage backend require manual reconciliation after restore.
  failureDomain: Loss of the Cinder database prevents volume provisioning and management operations. Existing attached 
    volumes continue to function via direct iSCSI connections between compute nodes and storage backend.
  backup:
    strategy: Automated daily full backup using Percona XtraBackup with 4-hourly incremental backups. Backups written to
      object storage.
    platform: Percona XtraBackup writing to Swift object storage on the openstack-controller deployment target.
    rto: 2 hours for full restore; near-zero for Galera node failure.
    rpo: 4 hours maximum; near-zero for Galera replication.
  ha:
    mechanism: MariaDB Galera cluster with 3 synchronous replicas and HAProxy.
  encryption:
    atRest: MariaDB data-at-rest encryption enabled with tablespace-level encryption on the Cinder schema. Volume 
      encryption keys are managed by Barbican (when deployed).
  accessControl:
    model: Role-based database access. Cinder service account has DML access to the cinder schema only.
  relationshipRationales:
    Backup Service: Percona XtraBackup automated backup writes point-in-time backups to Swift object storage. Modeled to
      show the external backup platform dependency.
  access_control_model: Role-based database access. Cinder service account has DML access to the cinder schema only. 
    Credentials managed by Ansible configuration management.
  backup_strategy: Automated daily full backup using Percona XtraBackup with 4-hourly incremental backups written to 
    Swift object storage. RTO 2h, RPO 4h.
internalComponents:
- ref: STCK00000E-TC0E
  role: MariaDB Galera cluster providing the relational database engine for the Cinder block storage state schema.
