schemaVersion: '1.0'
uid: STCK000005-DAR5
type: data_store_service
name: Cinder Database
description: 'MariaDB database schema dedicated to OpenStack Cinder for persisting all block storage service state. Stores
  volume records, snapshot records, attachment records, volume type definitions, backend service state, quota allocations,
  and encryption key references. The actual block data resides on the storage backend (iSCSI targets, SAN/NAS). Loss of this
  database orphans volumes on the storage backend but does not destroy block data.

  '
version: 1.0.0
catalogStatus: incomplete
lifecycleStatus: existing-only
