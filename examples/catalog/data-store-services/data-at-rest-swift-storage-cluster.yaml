schemaVersion: '1.0'
uid: STCK000006-DAR6
type: data_store_service
name: Swift Storage Cluster
description: 'OpenStack Swift object storage cluster providing durable, distributed
  storage for unstructured data. Consists of multiple storage nodes running swift-account,
  swift-container, and swift-object daemons. Uses consistent hashing and configurable
  replication (default 3 replicas) for durability without a single point of failure.
  Primary consumers are Glance (image binaries) and tenants using the S3-compatible
  object storage API directly.

  '
