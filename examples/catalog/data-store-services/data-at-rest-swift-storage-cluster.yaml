architecturalDecisions:
  serviceAuthentication: All access to Swift storage nodes is via the swift-proxy-server
    which enforces Keystone authentication. Direct access to storage nodes is restricted
    at the network level to the proxy tier only.
  secretsManagement: Storage node configuration is managed by configuration management
    tooling. Ring files are distributed to all nodes. No per-tenant secrets are stored
    on storage nodes.
  serviceLogging: Swift storage daemons emit access and error logs. Logs are shipped
    to the centralised log aggregation platform. Replication logs are monitored for
    data consistency.
  healthWelfareMonitoring: Swift cluster health is monitored via swift-recon and swift-dispersion-report.
    Per-node disk usage, replication completeness, and async pending counts are tracked.
    Alerts fire on disk failures, replication lag, and capacity thresholds.
  availabilityModel: Swift uses a shared-nothing distributed architecture. Object
    reads and writes are distributed across storage nodes using consistent hashing.
    Failure of storage nodes reduces available capacity but does not interrupt access
    as long as replica quorum is maintained.
  scalabilityModel: Storage capacity scales by adding storage nodes and rebalancing
    the Swift ring. The cluster supports horizontal scale-out to petabyte capacity.
    No downtime is required for ring rebalancing.
  recoverabilityModel: Data durability is provided by the replication factor (default
    3). Lost storage nodes are replaced and data is automatically replicated to restore
    the replication factor. There is no traditional backup/restore for object data
    — durability comes from replication.
  failureDomain: Loss of a minority of storage nodes reduces capacity and resilience
    but does not cause data loss. Loss of a majority of nodes holding a given replica
    set causes data unavailability for affected objects. Cluster-wide failures require
    hardware recovery.
  backup:
    strategy: Object durability is achieved through 3x replication across storage
      nodes distributed across separate failure domains. For critical data, cross-region
      replication via Swift replication can be configured. Traditional backup is not
      applicable for the object storage cluster itself.
    rto: Near-zero for node failures with surviving replicas; hours for full cluster
      rebuild from hardware.
    rpo: Near-zero — synchronous replication ensures no data loss for confirmed writes.
  ha:
    mechanism: Consistent hashing ring with 3x replication factor. Reads and writes
      are distributed across nodes. No single master — all nodes are peers. Quorum
      reads/writes ensure consistency.
  encryption:
    atRest: Swift supports server-side encryption using the Keymaster and KMIP middleware.
      When enabled, all object data is encrypted with per-object keys before writing
      to disk.
  accessControl:
    model: Access control is enforced at the Swift proxy layer via Keystone ACLs.
      Containers have ACLs defining read and write permissions per project and user.
      Storage nodes are not directly accessible to tenants.
  externalInteractionRationales: {}
