schemaVersion: '1.0'
uid: STCK000004-DAR4
type: data_store_service
name: Neutron Database
description: 'MariaDB database schema dedicated to OpenStack Neutron for persisting
  all network service state. Stores virtual networks, subnets, ports, routers, floating
  IPs, security groups, security group rules, load balancers, and ML2 plugin state.
  This is one of the higher-volume schemas due to the number of ports created per
  instance during compute operations.

  '
version: 1.0.0
catalogStatus: draft
lifecycleStatus: existing-only
owner:
  team: platform-engineering
  contact: platform-engineering@example.com
tags:
- data-at-rest
- openstack
- neutron
- networking
- database
- mariadb
- iaas
deliveryModel: self-managed
host: STCK00000F-HS0F
primaryTechnologyComponent: STCK00000E-TC0E
architecturalDecisions:
  serviceAuthentication: Neutron connects to its database schema using a dedicated
    MariaDB service account with credentials configured in neutron.conf.
  secretsManagement: Database credentials stored in neutron.conf managed by configuration
    management tooling.
  serviceLogging: MariaDB slow query logs and error logs for the Neutron schema are
    shipped to the centralised log aggregation platform.
  healthWelfareMonitoring: MariaDB Galera cluster health monitored via wsrep status.
    Port allocation rate and ML2 plugin query latency are tracked as health indicators.
  availabilityModel: Hosted in the 3-node MariaDB Galera cluster. Loss of one node
    does not interrupt availability.
  scalabilityModel: The Neutron schema grows with the number of ports, networks, and
    security group rules. Archival of deleted resource records is recommended for
    large deployments.
  recoverabilityModel: Data recovered from MariaDB Galera replication. Virtual network
    configuration is rebuilt from database state on neutron-agent restart. Schema
    migrations applied via neutron-db-manage upgrade.
  failureDomain: Loss of the Neutron database prevents network provisioning operations
    (new ports, router updates, floating IP assignment). Existing network connectivity
    on the data plane is unaffected as it is programmed in the kernel/OVS tables.
  backup:
    strategy: Automated daily full backup using Percona XtraBackup with 4-hourly
      incremental backups. Backups written to object storage.
    platform: Percona XtraBackup writing to Swift object storage on the openstack-controller
      deployment target.
    rto: 2 hours for full restore; near-zero for Galera node failure.
    rpo: 4 hours maximum; near-zero for Galera replication.
  ha:
    mechanism: MariaDB Galera cluster with 3 synchronous replicas and HAProxy.
  encryption:
    atRest: MariaDB data-at-rest encryption enabled with tablespace-level encryption
      on the Neutron schema.
  accessControl:
    model: Role-based database access. Neutron service account has DML access to the
      neutron schema only.
  externalInteractionRationales:
    Backup Service: Percona XtraBackup automated backup writes point-in-time backups
      to Swift object storage. Modeled to show the external backup platform dependency.
internalComponents:
- ref: STCK00000E-TC0E
  role: MariaDB Galera cluster providing the relational database engine for the Neutron
    network state schema.
externalInteractions:
- name: Backup Service
  capabilities: []
  notes: Point-in-time backups via Percona XtraBackup automated backup tooling writing
    to object storage.
requirementGroups: []
requirementImplementations: []
