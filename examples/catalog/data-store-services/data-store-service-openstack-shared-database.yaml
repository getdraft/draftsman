schemaVersion: '1.0'
uid: STCK000007-DAR7
type: data_store_service
name: OpenStack Shared Database
description: 'Shared MariaDB database cluster hosting the schemas for OpenStack services
  that do not warrant dedicated database objects at this modeling granularity: Heat,
  Ironic, Trove, Sahara, and Ceilometer. Each service maintains its own isolated
  schema (database) within the shared cluster. This consolidation is appropriate
  for medium-scale deployments; large-scale deployments may separate schemas to dedicated
  clusters.

  '
version: 1.0.0
catalogStatus: draft
lifecycleStatus: existing-only
