schemaVersion: '1.0'
uid: STCK000001-DAR1
type: data_store_service
name: Nova Database
description: 'MariaDB database schema dedicated to OpenStack Nova for persisting all
  compute service state. Stores instance records, flavor definitions, host aggregates,
  cell mappings, scheduler hints, migration records, and quota allocations. Hosted
  within the shared MariaDB Galera cluster on the OpenStack controller nodes.

  '
version: 1.0.0
catalogStatus: incomplete
lifecycleStatus: existing-only
