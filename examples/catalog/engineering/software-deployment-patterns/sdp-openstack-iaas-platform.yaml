schemaVersion: '1.0'
uid: STCK000001-SDP1
type: software_deployment_pattern
name: OpenStack IaaS Platform
description: |
  Full-stack self-managed OpenStack Infrastructure-as-a-Service deployment pattern covering the complete control plane and data plane. Includes compute (Nova), identity (Keystone), image (Glance), networking (Neutron), block storage (Cinder), object storage (Swift), orchestration (Heat), telemetry (Ceilometer), bare metal (Ironic), database-as-a-service (Trove), data processing (Sahara), and the Horizon web dashboard. All services share a RabbitMQ message broker cluster and MariaDB Galera database cluster running on dedicated controller nodes.
version: 1.0.0
catalogStatus: complete
lifecycleStatus: existing-only
followsReferenceArchitecture: 01KS8N4KR2-3TWA
owner:
  team: platform-engineering
  contact: platform-engineering@example.com
tags:
- software-deployment-pattern
- openstack
- iaas
- cloud
- platform
businessContext:
  pillar: business-pillar.infrastructure
  productFamily: Cloud Infrastructure
notes:
  availabilityTarget: 99.9%
  availabilityRequirement: >-
    All control plane services target 99.9% availability via active-active deployment on a minimum 3-node
    controller cluster with HAProxy for request distribution. Data plane (running instances, networking)
    operates independently of control plane availability.
  dataClassification: Internal
  failureDomain:
    scope: platform-wide
    description: >-
      Failure of the control plane affects all tenants. Data plane (compute, networking, storage) is designed
      to tolerate control plane outages for running workloads.
  patternDeviations: none
  deploymentTargets: >-
    Self-managed bare metal deployment on dedicated OpenStack controller nodes and compute nodes within
    the company private data center. All control plane services run on the openstack-controller host class.
    Compute services run on openstack-compute host class. No cloud-provider managed services are used;
    all infrastructure is owned and operated by the platform-engineering team.
  reference_architecture_conformance: >-
    Follows Three-Tier Web Application RA (01KS8N4KR2-3TWA). Horizon + HAProxy satisfy the presentation
    tier. Nova, Neutron, Cinder, Glance, Keystone, Heat, and supporting services satisfy the application
    tier. MariaDB Galera and Swift satisfy the data tier. No WAF is required; the deployment is internal-only
    and access-controlled by network boundary and VPN/ZTNA. See decision record 01KSE5V73Z-CRZV.
  interServiceConnections: >-
    Cross-tier and cross-zone communication paths are documented as relationship objects in examples/catalog/relationships/.
    Key tier crossings include API LB → Nova/Neutron/Keystone (presentation→application), all services
    → RabbitMQ (application→utility AMQP), all services → Keystone (application→application auth), and
    all services → MariaDB databases (application→data).
  externalDependencies: >-
    External dependencies are documented as relationship objects. Keystone optionally federates with an
    LDAP Directory for enterprise identity. All MariaDB schemas and Swift storage depend on an external
    Backup Service for point-in-time recovery.
decisionRecords:
- ref: 01KSE5V73Z-CRZV
  key: edge-protection
  notes: >-
    Data classification is Internal per notes.dataClassification. The platform does not process
    public or confidential data directly; tenant workloads inherit their own classification independently
    of this SDP.
