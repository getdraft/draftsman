operatingSystemComponent: 01KQQ4Q025-3HXA
computePlatformComponent: STCK00000F-TC0F
architectureNotes:
  authentication: Centralized authentication via enterprise LDAP/Active Directory
    integrated with PAM. SSH key-based access only for service accounts; password
    auth disabled. Sudo access restricted to named platform-engineering team members
    via sudoers managed by Ansible.
  health_welfare_monitoring: Host health monitored via Prometheus node_exporter.
    CPU, memory, disk, and network metrics collected and forwarded to the centralised
    monitoring platform. Alerting configured for resource exhaustion and node
    unreachability.
  security_monitoring: CrowdStrike Falcon agent deployed on all OpenStack Linux
    hosts for EDR and security event collection. Events forwarded to SIEM.
  patch_management: OS and package patching managed by Ansible playbooks on a
    monthly cadence for routine patches. Emergency patches applied within 72 hours
    of critical CVE disclosure. Patch execution requires platform-engineering approval
    and is performed during maintenance windows.
  log_management: System logs (syslog, auth.log, kernel) and OpenStack service
    logs forwarded to the centralised log aggregation platform via Fluentd.
