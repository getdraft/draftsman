type: host
name: OpenStack Linux Service Host
description: 'General-purpose self-managed Linux host standard for the OpenStack example
  control-plane, data, and utility services. This models the reusable substrate pattern,
  not a single node role.

  '
version: 1.0.0
catalogStatus: incomplete
lifecycleStatus: existing-only
owner:
  team: platform-engineering
  contact: platform-engineering@example.com
