name: OpenStack Ceilometer
description: 'OpenStack Ceilometer is the telemetry service for OpenStack. It collects
  metering and monitoring data from across the OpenStack platform including ceilometer-api,
  ceilometer-collector, ceilometer-agent-notification, ceilometer-alarm-evaluator,
  and ceilometer-alarm-notifier. Ceilometer consumes the RabbitMQ notification bus
  to gather metrics from Nova, Neutron, Cinder, and other services.

  '
