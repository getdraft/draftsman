name: MariaDB 10.11
description: 'MariaDB 10.11 is the long-term support relational database used as
  the persistence backend for OpenStack services. Each OpenStack service maintains
  its own database schema within the shared MariaDB cluster. In production deployments
  MariaDB is deployed as a Galera cluster for synchronous multi-master replication
  and high availability.

