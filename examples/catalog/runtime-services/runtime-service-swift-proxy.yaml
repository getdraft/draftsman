type: runtime_service
name: Swift Proxy Service
description: 'Self-managed deployment of the OpenStack Swift proxy-server providing
  the API gateway for all object storage operations. The swift-proxy-server handles
  client requests, authenticates via Keystone, routes requests to appropriate swift-account,
  swift-container, and swift-object storage nodes, and applies middleware for features
  like rate limiting and bulk operations. The proxy layer is stateless and scales
  horizontally.

  '
