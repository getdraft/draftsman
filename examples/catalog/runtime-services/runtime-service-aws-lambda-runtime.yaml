type: runtime_service
name: AWS Lambda Runtime
description: 'AWS Lambda serverless execution environment. Runs organization-authored function code without requiring host
  management. Scales automatically. Host infrastructure is entirely blackbox.

  '
version: 1.0.0
catalogStatus: incomplete
lifecycleStatus: preferred
owner:
  team: cloud-architecture
  contact: cloud-architecture@example.com
tags:
- serverless
- lambda
deliveryModel: paas
vendor: Amazon Web Services
productName: AWS Lambda Runtime
productVersion: managed
networkPlacement: vpc-private
patchingOwner: provider-managed
authenticationModel: iam
architectureNotes:
  resilienceModel: Inherently multi-tenant and highly available within the AWS Lambda managed execution fabric.
  authenticationAccessModel: AWS IAM controls administrative access, function execution roles, and service-to-service 
    authorization.
  configurableSurface: The adopter controls function configuration, IAM bindings, concurrency settings, environment 
    variables, and event-source mappings.
  failureDomain: Shared serverless runtime dependency for the functions bound to this Lambda execution environment.
  relationshipRationales:
    AWS IAM: IAM is modeled as an external dependency because it controls Lambda access even though the PaaS requirement
      is satisfied by authenticationModel.
    Amazon CloudWatch Logs: CloudWatch Logs is modeled to show adopter-visible function log delivery outside the core 
      PaaS function requirement.
    Amazon CloudWatch Metrics: CloudWatch Metrics is modeled to show operational telemetry for Lambda even though this 
      managed runtime is governed by PaaS delivery requirements.
  secrets_management: AWS Lambda Runtime credentials stored in service configuration managed by Ansible.
