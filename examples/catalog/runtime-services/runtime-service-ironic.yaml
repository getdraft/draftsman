schemaVersion: '1.0'
uid: STCK000009-RS09
type: runtime_service
name: Ironic Bare Metal Service
description: 'Self-managed deployment of OpenStack Ironic providing bare metal provisioning
  as a service. Runs ironic-api and ironic-conductor subcomponents. Ironic enrolls
  physical hardware using IPMI, Redfish, iLO, or DRAC interfaces, integrates with
  Nova to expose bare metal nodes through the standard compute API, and uses RabbitMQ
  for conductor messaging. Enables operators to provision operating systems directly
  onto physical machines using standard OpenStack workflows.

  '
