type: runtime_service
name: Neutron Networking Service
description: 'Self-managed deployment of OpenStack Neutron providing software-defined
  networking for the OpenStack platform. Runs neutron-api, neutron-plugin (ML2), and
  neutron-agents (L2 agent, L3 agent, DHCP agent, metadata agent) subcomponents. Manages
  virtual networks, subnets, routers, floating IPs, and security groups. Uses RabbitMQ
  for agent coordination and MariaDB for network state persistence.

  '
