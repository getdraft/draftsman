architecturalDecisions:
  serviceAuthentication: All Neutron API requests are authenticated via Keystone token
    validation. Neutron service account is registered in the Keystone service catalog.
    Neutron agents authenticate with the neutron-api using service tokens.
  secretsManagement: Database credentials and RabbitMQ credentials are stored in
    neutron.conf managed by configuration management tooling.
  serviceLogging: Neutron API and agents emit logs to /var/log/neutron/. Logs are
    shipped to the centralised log aggregation platform. L3 agent logs are especially
    important for routing troubleshooting.
  healthWelfareMonitoring: neutron-api health is verified via HTTP endpoint polling.
    Agent liveness is monitored via agent heartbeat checks (neutron agent-list). RabbitMQ
    queue depth for network events is monitored.
  availabilityModel: neutron-api runs active-active across controller nodes behind
    a load balancer. L3 agents and DHCP agents can be configured in HA mode using
    VRRP. Failure of a network agent affects only the network resources it manages.
  scalabilityModel: neutron-api scales horizontally. Network agent capacity scales
    by deploying additional network nodes.
  recoverabilityModel: API processes recovered via systemd restart. Network state
    recovered from MariaDB Galera. Virtual network configuration is re-applied from
    database state on agent restart.
  failureDomain: Failure of neutron-api prevents new network provisioning operations.
    Failure of L3 agents affects routing for floating IPs and router-attached subnets.
    Existing instance connectivity on L2 (VXLAN/VLAN) is unaffected by control plane
    failure.
  externalInteractionRationales:
    Keystone Identity: All Neutron API requests require Keystone token validation.
      Modeled to show the authentication dependency.
    RabbitMQ Message Broker: Neutron uses RabbitMQ for ML2 plugin messaging to distributed
      L2 agents on compute and network nodes. Modeled as a critical distributed messaging
      dependency.
    Neutron Database: Neutron persists all network topology state to MariaDB. Modeled
      as a critical stateful dependency.
internalComponents:
