schemaVersion: '1.0'
uid: STCK000003-RS03
type: runtime_service
name: Glance Image Service
description: 'Self-managed deployment of OpenStack Glance providing virtual machine
  image storage and retrieval. Runs glance-api and glance-registry subcomponents.
  Image metadata is stored in MariaDB and image binaries are stored in the Swift
  object storage cluster. Nova retrieves images from Glance when provisioning compute
  instances.

  '
version: 1.0.0
catalogStatus: incomplete
