type: runtime_service
name: Cinder Block Storage Service
description: 'Self-managed deployment of OpenStack Cinder providing persistent block storage volumes for compute instances.
  Runs cinder-api, cinder-scheduler, and cinder-volume subcomponents. Supports iSCSI as the primary storage backend with optional
  integration to SAN/NAS appliances. Uses RabbitMQ for internal messaging and MariaDB for volume state persistence.

  '
