schemaVersion: '1.0'
uid: STCK000001-RS01
type: runtime_service
name: Nova Compute Service
description: 'Self-managed deployment of OpenStack Nova providing virtual machine lifecycle management
  across the platform. Runs nova-api, nova-scheduler, nova-conductor, nova-consoleauth, and nova-compute
  subcomponents. Coordinates with Neutron for networking, Cinder for volumes, and Glance for images. Uses
  RabbitMQ for internal messaging and MariaDB for state persistence.

  '
