architectureNotes:
  serviceAuthentication: All Sahara API requests are authenticated via Keystone token validation. Sahara service account
    is registered in the Keystone service catalog. Sahara uses the requesting user's scoped token to provision Nova 
    instances on their behalf.
  secretsManagement: Database credentials and any cluster provisioning credentials are stored in sahara.conf managed by 
    configuration management tooling.
  serviceLogging: Sahara emits logs to /var/log/sahara/. Logs are shipped to the centralised log aggregation platform.
  healthWelfareMonitoring: sahara-api health is verified via HTTP endpoint polling. Cluster provisioning job status is 
    monitored via Sahara cluster state machine health checks.
  availabilityModel: sahara-api and sahara-all run behind a load balancer. Sahara is generally not HA-critical as data 
    processing workloads are inherently batch-oriented.
  scalabilityModel: sahara-api scales horizontally. Cluster compute capacity scales by provisioning larger or more Nova 
    instances in the data processing cluster.
  recoverabilityModel: Control plane processes recovered via systemd restart. Sahara state recovered from MariaDB. 
    In-progress cluster provisioning operations may need to be retried after service failure.
  failureDomain: Failure of Sahara prevents cluster provisioning and management operations. Running Hadoop/Spark 
    clusters on Nova instances continue to operate independently.
  externalInteractionRationales:
    Keystone Identity: All Sahara API requests require Keystone token validation. Modeled to show the authentication 
      dependency.
    Sahara Database: Sahara persists cluster templates, node group templates, and cluster operational state to MariaDB. 
      Modeled as a critical stateful dependency.
  secrets_management: Database credentials and any cluster provisioning credentials are stored in sahara.
internalComponents:
- ref: STCK00000C-TC0C
  role: Core data processing service providing sahara-api and sahara-all for Hadoop/Spark cluster lifecycle management.
