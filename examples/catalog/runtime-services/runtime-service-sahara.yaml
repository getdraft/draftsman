uid: STCK00000B-RS0B
type: runtime_service
name: Sahara Data Processing Service
description: 'Self-managed deployment of OpenStack Sahara providing data processing cluster orchestration on OpenStack. Runs
  sahara-api and sahara-all subcomponents. Sahara automates the provisioning and management of Apache Hadoop and Apache Spark
  clusters on Nova compute instances, enabling tenants to run big data workloads without manually managing cluster lifecycle.
  Clusters are defined via cluster templates and node group templates.

  '
