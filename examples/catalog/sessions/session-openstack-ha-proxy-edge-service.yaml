description: Incomplete authoring session for the HAProxy load balancer edge gateway
  service object. HAProxy fronts the OpenStack public network zone, distributing
  API and Horizon traffic across controller nodes. This session captures unresolved
  questions about whether HAProxy should be modeled as a separate edge_gateway_service
  catalog object or whether its role is sufficiently captured as a deployment note
  on the Horizon runtime service.
