  proposedUid: TBD
  notes: Stub exists as a placeholder. Requires confirmation of deployment topology
    (dedicated VMs vs. co-located on controller nodes) before the object can be completed.
unresolvedQuestions:
- id: Q1
  question: Is HAProxy deployed on dedicated load balancer VMs, or co-located on
    the same controller nodes as the OpenStack services?
  status: open
  impact: Determines whether the edge_gateway_service object gets its own deploymentTarget
    or shares the openstack-controller host reference.
  currentBestGuess: Co-located on controller nodes based on standard Kolla-Ansible
    deployment defaults.
- id: Q2
  question: Does HAProxy terminate TLS, or does TLS pass through to the backend services?
  status: open
  impact: Affects the network binding and protocol declarations on the edge gateway
    object and the security compliance evidence for in-transit encryption.
  currentBestGuess: TLS terminated at HAProxy; backends use HTTP on the control plane
    network.
assumptions:
- id: A1
  statement: HAProxy version in use is 2.4 or later (shipped with Ubuntu 22.04 LTS).
  rationale: The controller host uses Ubuntu 22.04 LTS per the technology-component
    catalog.
  impact: If an older HAProxy version is in use, the edge_gateway_service object
    may need a technology-component version override.
nextSteps:
