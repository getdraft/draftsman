schemaVersion: '1.0'
uid: STCK000002-RS02
type: runtime_service
name: Keystone Identity Service
description: |
  Self-managed deployment of OpenStack Keystone providing identity, authentication, and authorization services for all OpenStack platform components. Issues scoped tokens used by every other service for request validation. Manages projects, users, roles, groups, and service endpoints. Optionally federates with an external LDAP directory for enterprise identity integration.
version: 1.0.0
catalogStatus: incomplete
lifecycleStatus: existing-only
