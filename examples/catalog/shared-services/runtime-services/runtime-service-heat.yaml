uid: STCK000007-RS07
type: runtime_service
name: Heat Orchestration Service
description: |
  Self-managed deployment of OpenStack Heat providing infrastructure orchestration via the Heat Orchestration Template (HOT) format. Runs heat-api (native REST), heat-api-cfn (AWS CloudFormation-compatible), and heat-engine subcomponents. Heat creates and manages stacks of OpenStack resources, coordinating Nova, Neutron, Cinder, Glance, and other services. Uses RabbitMQ for engine-to-worker messaging and MariaDB for stack state persistence.
