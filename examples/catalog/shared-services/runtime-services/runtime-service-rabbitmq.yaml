architectureNotes:
  serviceAuthentication: OpenStack services authenticate to RabbitMQ using per-service AMQP credentials (username and 
    password) configured in each service's conf file. The RabbitMQ management interface is protected by separate admin 
    credentials.
  secretsManagement: RabbitMQ service credentials are stored in each OpenStack service's conf file, managed by 
    configuration management tooling. RabbitMQ admin credentials are stored in the platform secrets vault.
  serviceLogging: RabbitMQ emits logs to /var/log/rabbitmq/. Logs are shipped to the centralised log aggregation 
    platform. Queue depth and connection metrics are captured via the RabbitMQ management plugin.
  healthWelfareMonitoring: RabbitMQ cluster health is monitored via the management API. Queue depth, consumer counts, 
    connection counts, and node membership are monitored. Alerts fire when queues exceed depth thresholds or when 
    cluster nodes are lost.
  availabilityModel: RabbitMQ runs as a 3-node cluster with quorum queues for message durability. The cluster tolerates 
    loss of one node (majority quorum). All OpenStack services reconnect automatically on node failure.
  scalabilityModel: RabbitMQ capacity scales by adding nodes to the cluster. Message throughput scales with additional 
    queue sharding. OpenStack services use connection pools to distribute load across cluster nodes.
  recoverabilityModel: RabbitMQ cluster nodes are recovered via systemd restart. Quorum queue state is automatically 
    resynchronised on node rejoin. Messages published with delivery guarantees are not lost during single-node failure.
  failureDomain: Loss of RabbitMQ quorum (majority of cluster nodes) causes all OpenStack services using AMQP to stop 
    processing background tasks. nova-api, neutron-api, cinder-api, and other REST endpoints continue to function for 
    read-only operations but write operations that require background processing are queued or fail.
  relationshipRationales:
    RabbitMQ Service: RabbitMQ is the broker itself. Internal management operations use the management API on the local 
      cluster.
    Keystone Identity: All API requests to the RabbitMQ management plugin are authenticated via Keystone token 
      validation when the OpenStack Keystone auth backend is configured.
  secrets_management: RabbitMQ service credentials are stored in each OpenStack service's conf file, managed by 
    configuration management tooling.
internalComponents:
- ref: STCK00000D-TC0D
  role: Core AMQP message broker providing exchange and queue management, clustering, and quorum queue durability for 
    all OpenStack services.
