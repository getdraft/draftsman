uid: STCK00000D-RS0D
type: runtime_service
name: RabbitMQ Message Broker Service
description: 'Self-managed deployment of RabbitMQ serving as the shared AMQP message broker for the OpenStack control plane.
  Provides the message transport layer for Nova, Neutron, Cinder, Heat, Ceilometer, Ironic, and Trove. Deployed as a 3-node
  RabbitMQ cluster with quorum queues for durability. All OpenStack services connect to RabbitMQ using dedicated virtual hosts
  and credentials.

  '
