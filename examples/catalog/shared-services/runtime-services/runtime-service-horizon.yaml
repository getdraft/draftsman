deliveryModel: self-managed
host: STCK00000F-HS0F
primaryTechnologyComponent: STCK000007-TC07
notes:
  serviceAuthentication: >-
    Horizon authenticates users via Keystone credential submission. The dashboard itself does not issue
    tokens; it passes user credentials to Keystone and stores the returned scoped token in the user's
    browser session.
  secretsManagement: >-
    Horizon SECRET_KEY is stored in local_settings.py managed by configuration management. Keystone admin
    credentials are not stored by Horizon; all operations use user-scoped tokens.
  serviceLogging: >-
    Horizon emits application logs via Django logging to /var/log/horizon/. nginx access and error logs
    are captured separately. All logs are shipped to the centralised log aggregation platform.
  healthWelfareMonitoring: >-
    nginx health is monitored via HTTP endpoint polling. Django application health is monitored via uwsgi
    worker metrics. Browser session errors are surfaced via application logging.
  availabilityModel: >-
    Horizon runs active-active across multiple controller nodes behind a load balancer with sticky sessions
    or shared session storage. nginx handles TLS termination and upstream proxying.
  scalabilityModel: >-
    Horizon scales horizontally by adding Django/uwsgi workers. It is stateless in terms of OpenStack
    data (all state is in the OpenStack API layer).
  recoverabilityModel: >-
    nginx and uwsgi processes are recovered via systemd restart. No persistent state is held by Horizon;
    recovery is immediate upon process restart.
  failureDomain: >-
    Failure of Horizon prevents web UI access but does not affect the OpenStack API layer. CLI tools and
    automated tooling remain fully operational during a Horizon outage.
  relationshipRationales:
    Nova Compute Service: >-
      Horizon calls Nova APIs to display and manage instances, flavors, key pairs, and server console
      access. Modeled to show the compute API dependency.
    Keystone Identity: >-
      Horizon submits user credentials to Keystone for token issuance. All subsequent API calls use the
      resulting scoped token. Modeled as the primary authentication dependency.
    Glance Image Service: >-
      Horizon calls Glance APIs to display and manage VM images. Modeled to show the image management
      dependency.
    Neutron Networking: >-
      Horizon calls Neutron APIs to display and manage networks, subnets, routers, and security groups.
      Modeled to show the networking management dependency.
    Cinder Block Storage: >-
      Horizon calls Cinder APIs to display and manage volumes and snapshots. Modeled to show the storage
      management dependency.
    Heat Orchestration: >-
      Horizon calls Heat APIs to display and launch orchestration stacks. Modeled to show the orchestration
      management dependency.
  secrets_management: Horizon SECRET_KEY is stored in local_settings.
