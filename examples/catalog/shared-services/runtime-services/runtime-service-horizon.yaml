schemaVersion: '1.0'
uid: STCK000006-RS06
type: runtime_service
name: Horizon Dashboard
description: |
  Self-managed deployment of OpenStack Horizon providing the web-based management dashboard for the OpenStack platform. Served via nginx as a Django WSGI application. Provides self-service tenant portals and operator administrative interfaces. Horizon consumes Nova, Keystone, Glance, Neutron, Cinder, and Heat APIs to present a unified management experience accessible from the public internet.
version: 1.0.0
