schemaVersion: '1.0'
uid: STCK00000A-RS0A
type: runtime_service
name: Trove Database Service
description: |
  Self-managed deployment of OpenStack Trove providing database-as-a-service on top of the OpenStack compute platform. Runs trove-api, trove-conductor, and trove-taskmanager subcomponents. Trove provisions database instances (MySQL, PostgreSQL, MongoDB, etc.) as Nova virtual machines with pre-configured database software, offering tenants a managed DBaaS experience without exposing the underlying infrastructure.
