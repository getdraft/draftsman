primaryTechnologyComponent: STCK00000B-TC0B
notes:
  serviceAuthentication: >-
    All Trove API requests are authenticated via Keystone token validation. Trove service account is registered
    in the Keystone service catalog. Guest agents running in database instances authenticate back to the
    Trove conductor via RabbitMQ with per-instance credentials.
  secretsManagement: >-
    Database credentials and RabbitMQ credentials are stored in trove.conf managed by configuration management
    tooling. Per-instance guest agent credentials are injected at instance provisioning time.
  serviceLogging: >-
    Trove emits logs to /var/log/trove/. Logs are shipped to the centralised log aggregation platform.
  healthWelfareMonitoring: >-
    trove-api health is verified via HTTP endpoint polling. Instance health is monitored via guest agent
    heartbeats. Database instance availability is checked via Trove health checks.
  availabilityModel: >-
    trove-api runs active-active behind a load balancer. trove-taskmanager and trove-conductor run on
    controller nodes with RabbitMQ providing work distribution. Database instance HA depends on the database
    engine and Trove replication configuration.
  scalabilityModel: >-
    trove-api scales horizontally. trove-taskmanager scales by adding additional workers. Database capacity
    scales by provisioning additional Trove instances.
  recoverabilityModel: >-
    Control plane processes recovered via systemd restart. Trove state recovered from MariaDB. Database
    instance data recovery depends on the instance backup configuration.
  failureDomain: >-
    Failure of Trove control plane prevents provisioning new database instances. Existing database instances
    continue to operate as they run as independent Nova VMs.
  relationshipRationales:
    Keystone Identity: >-
      All Trove API requests require Keystone token validation. Modeled to show the authentication dependency.
    RabbitMQ Message Broker: >-
      Trove uses RabbitMQ for task messaging between trove-api, trove-taskmanager, and guest agents running
      in database VMs. Modeled as a critical distributed messaging dependency.
    Trove Database: >-
      Trove persists all database instance metadata and configuration to MariaDB. Modeled as a critical
      stateful dependency.
  secrets_management: Database credentials and RabbitMQ credentials are stored in trove.
