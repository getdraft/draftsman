name: RabbitMQ 3.8
description: 'RabbitMQ is a widely deployed open-source message broker implementing
  AMQP. In OpenStack it serves as the shared message transport layer for Nova, Neutron,
  Cinder, Heat, Ceilometer, Ironic, and Trove. Services publish work items and status
  notifications to RabbitMQ exchanges, and subcomponents (schedulers, conductors,
  agents) consume from queues to execute distributed tasks.

  '
