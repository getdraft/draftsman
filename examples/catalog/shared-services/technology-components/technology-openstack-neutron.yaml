name: OpenStack Neutron
description: 'OpenStack Neutron is the networking service providing software-defined
  networking capabilities to the OpenStack platform. It includes neutron-api, neutron-plugin,
  and neutron-agents subcomponents. Neutron manages virtual networks, subnets, routers,
  floating IPs, security groups, and load balancers, communicating with compute nodes
  via RabbitMQ.

