name: OpenStack Cinder
description: 'OpenStack Cinder is the block storage service that provides persistent
  block volumes to Nova compute instances. It includes cinder-api, cinder-scheduler,
  and cinder-volume subcomponents. Cinder supports multiple storage backends including
  iSCSI, Fibre Channel, Ceph RBD, and vendor-specific drivers, and uses RabbitMQ
  for internal messaging.

