name: OpenStack Ironic
description: 'OpenStack Ironic is the bare metal provisioning service. It exposes
  ironic-api and uses ironic-conductor to manage physical hardware through IPMI, Redfish,
  iLO, and DRAC driver interfaces. Ironic integrates with Nova to allow bare metal
  machines to be enrolled in the compute scheduling pool and provisioned using standard
  OpenStack workflows.

