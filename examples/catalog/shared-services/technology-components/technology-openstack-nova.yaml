description: 'OpenStack Nova is the compute service responsible for managing and provisioning
  virtual machine instances. It includes nova-api, nova-scheduler, nova-conductor,
  nova-compute, and nova-consoleauth subcomponents. Nova interacts with the hypervisor
  layer (KVM/QEMU) and coordinates with Neutron, Cinder, and Glance to deliver full
  instance lifecycle management.

