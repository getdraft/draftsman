uid: 01KSF29JTP-9HYA
type: network_service
name: OpenStack API Load Balancer
description: >-
  HAProxy load balancer co-located on OpenStack controller nodes. Distributes inbound API and dashboard
  traffic across all active controller nodes in the active-active control plane cluster. Provides health
  checking, connection queuing, and SSL termination for the OpenStack public network zone.
version: 1.0.0
catalogStatus: complete
lifecycleStatus: existing-only
owner:
  team: platform-engineering
  contact: platform-engineering@example.com
