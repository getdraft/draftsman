  externalInteractions:
  - name: CLI Clients & Cloud Management Tools
    type: external
    notes: Operators and tenants access OpenStack APIs via CLI tools (nova, cinder,
      neutron, openstack CLI) and automation tooling (Terraform, Ansible). API endpoints
      are exposed on the public network zone via the load balancer.
  - name: LDAP Directory
    type: external
    notes: Optional enterprise identity federation. When configured, Keystone delegates
      user and group lookups to the external LDAP directory, allowing enterprise credentials
      to be used for OpenStack authentication.

- name: Data Infrastructure
  deploymentTarget: openstack-controller
  deployableObjects:
  - ref: STCK000001-DAR1
    diagramTier: data
    networkZone: data
    intent: ha
    notes: Nova database schema in the MariaDB Galera cluster. Persists all compute
      service state.
  - ref: STCK000002-DAR2
    diagramTier: data
    networkZone: data
    intent: ha
    notes: Keystone database schema. Highest-criticality schema — loss causes platform-wide
      outage.
  - ref: STCK000003-DAR3
    diagramTier: data
    networkZone: data
    intent: ha
    notes: Glance database schema. Stores image metadata; image binaries are in Swift.
  - ref: STCK000004-DAR4
    diagramTier: data
    networkZone: data
    intent: ha
    notes: Neutron database schema. Stores virtual network topology state.
  - ref: STCK000005-DAR5
    diagramTier: data
    networkZone: data
    intent: ha
    notes: Cinder database schema. Stores volume and snapshot records.
  - ref: STCK000007-DAR7
    diagramTier: data
    networkZone: data
    intent: ha
    notes: Shared database cluster for Heat, Ironic, Trove, Sahara, and Ceilometer
      schemas. Each service has an isolated schema within this cluster.
  - ref: STCK000006-DAR6
    diagramTier: data
    networkZone: data
    intent: ha
    notes: Swift object storage cluster providing durable distributed storage. Primary
      consumer is Glance for image binary storage.
  - ref: STCK00000D-RS0D
    diagramTier: utility
    networkZone: data
    intent: ha
    notes: RabbitMQ 3-node cluster providing shared AMQP message transport for all
      OpenStack services. Quorum queues ensure message durability.
  connections: []
  externalInteractions: []
