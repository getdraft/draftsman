schemaVersion: '1.0'
uid: STCK000001-SDP1
type: software_deployment_pattern
name: OpenStack IaaS Platform
description: 'Full-stack self-managed OpenStack Infrastructure-as-a-Service deployment
  pattern covering the complete control plane and data plane. Includes compute (Nova),
  identity (Keystone), image (Glance), networking (Neutron), block storage (Cinder),
  object storage (Swift), orchestration (Heat), telemetry (Ceilometer), bare metal
  (Ironic), database-as-a-service (Trove), data processing (Sahara), and the Horizon
  web dashboard. All services share a RabbitMQ message broker cluster and MariaDB
  Galera database cluster running on dedicated controller nodes.

  '
version: 1.0.0
catalogStatus: draft
lifecycleStatus: existing-only
owner:
  team: platform-engineering
  contact: platform-engineering@example.com
tags:
- software-deployment-pattern
- openstack
- iaas
- cloud
- platform
businessContext:
  pillar: business-pillar.infrastructure
  productFamily: Cloud Infrastructure
architecturalDecisions:
  availabilityTarget: "99.9%"
  availabilityRequirement: All control plane services target 99.9% availability via
    active-active deployment on a minimum 3-node controller cluster with HAProxy for
    request distribution. Data plane (running instances, networking) operates independently
    of control plane availability.
  dataClassification: Internal
  failureDomain:
    scope: platform-wide
    description: Failure of the control plane affects all tenants. Data plane (compute,
      networking, storage) is designed to tolerate control plane outages for running
      workloads.
  patternDeviations: none
networkZones:
- id: public
  name: Public
  description: Internet-facing tier hosting the Horizon dashboard and OpenStack API
    endpoints accessible to operators and tenants via CLI tools.
- id: control
  name: Control Plane
  description: Internal tier hosting all OpenStack API services, schedulers, conductors,
    and message broker. Not directly accessible from the public internet; fronted
    by the load balancer.
- id: data
  name: Data Layer
  description: Internal tier hosting relational databases (MariaDB Galera), message
    broker (RabbitMQ), and object storage (Swift). Accessible only from control plane
    services.
serviceGroups:
- name: Presentation & API Layer
  deploymentTarget: openstack-controller
  deployableObjects:
  - ref: STCK000006-RS06
    diagramTier: presentation
    networkZone: public
    intent: ha
    notes: Horizon dashboard served via nginx. Internet-facing. Active-active across
      controller nodes with sticky sessions.
  - ref: STCK000001-RS01
    diagramTier: application
    networkZone: control
    intent: ha
    notes: Nova compute service. nova-api runs active-active behind load balancer.
      nova-scheduler and nova-conductor run on controller nodes.
  - ref: STCK000002-RS02
    diagramTier: application
    networkZone: control
    intent: ha
    notes: Keystone identity service. Runs active-active. Fernet token validation
      is stateless, enabling full horizontal HA.
  - ref: STCK000003-RS03
    diagramTier: application
    networkZone: control
    intent: ha
    notes: Glance image service. glance-api runs active-active. Image binaries stored
      in Swift cluster.
  - ref: STCK000004-RS04
    diagramTier: application
    networkZone: control
    intent: ha
    notes: Neutron networking service. neutron-api runs active-active. ML2 agents
      deployed on compute and network nodes.
  - ref: STCK000005-RS05
    diagramTier: application
    networkZone: control
    intent: ha
    notes: Cinder block storage service. cinder-api and cinder-scheduler run active-active.
      iSCSI backend storage.
  - ref: STCK000007-RS07
    diagramTier: application
    networkZone: control
    intent: ha
    notes: Heat orchestration service. heat-api and heat-api-cfn run active-active.
      heat-engine workers consume from RabbitMQ.
  - ref: STCK000008-RS08
    diagramTier: utility
    networkZone: control
    intent: ha
    notes: Ceilometer telemetry service. Consumes OpenStack notification bus from
      RabbitMQ. Non-critical path — does not affect instance operations.
  - ref: STCK000009-RS09
    diagramTier: application
    networkZone: control
    intent: ha
    notes: Ironic bare metal service. ironic-api runs active-active. ironic-conductor
      supports multi-conductor HA with node affinity.
  - ref: STCK00000A-RS0A
    diagramTier: application
    networkZone: control
    intent: ha
    notes: Trove database-as-a-service. trove-api runs active-active. Provisions
      database instances as Nova VMs.
  - ref: STCK00000B-RS0B
    diagramTier: application
    networkZone: control
    intent: ha
    notes: Sahara data processing service. sahara-api runs active-active. Provisions
      Hadoop/Spark clusters as Nova VM pools.
  - ref: STCK00000C-RS0C
    diagramTier: application
    networkZone: control
    intent: ha
    notes: Swift proxy service. Runs active-active behind load balancer. Fully stateless
      — provides the object storage API gateway.
