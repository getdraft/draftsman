name: OpenStack API Load Balancer
description: HAProxy load balancer co-located on OpenStack controller nodes. Distributes
  inbound API and dashboard traffic across all active controller nodes in the active-active
  control plane cluster. Provides health checking, connection queuing, and SSL termination
  for the OpenStack public network zone.
