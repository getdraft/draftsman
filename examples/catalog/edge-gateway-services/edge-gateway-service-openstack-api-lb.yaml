architecturalDecisions:
  serviceAuthentication: HAProxy does not authenticate requests itself. Authentication
    is delegated to backend services (Keystone for API requests, nginx/Django for
    Horizon). HAProxy operates in pass-through mode for TLS; backends receive forwarded
    requests with X-Forwarded-For headers.
  secretsManagement: HAProxy configuration and SSL certificates are managed by configuration
    management tooling (Ansible). Certificate private keys are stored in the OS certificate
    store on each controller node. No application-level secrets are held by HAProxy.
  serviceLogging: HAProxy logs all connections to syslog. Logs include client IP,
    backend selected, response code, and latency. Forwarded to the centralised log
    aggregation platform via local log shipper.
  healthWelfareMonitoring: HAProxy performs active health checks on each backend
    (nova-api, keystone, glance, neutron, cinder, horizon) on a 2-second interval.
    Unhealthy backends are removed from rotation automatically. HAProxy statistics
    socket is exposed for monitoring agent collection.
  availabilityModel: HAProxy itself runs on all three controller nodes. A shared virtual
    IP (VIP) managed by Keepalived provides a single entry point. If the active Keepalived
    master fails, the VIP migrates to a standby within 2 seconds.
  scalabilityModel: HAProxy is stateless; scaling is achieved by adding controller
    nodes. Connection limits are tunable per backend.
  recoverabilityModel: HAProxy process is managed by systemd and restarts automatically
    on failure. Configuration is managed by configuration management tooling and can
    be reapplied within minutes.
  failureDomain: Loss of the active HAProxy instance causes a 2-second VIP failover
    via Keepalived. Loss of all controller nodes renders the control plane unavailable;
    data plane (running instances) continues unaffected.
  externalInteractionRationales:
    OpenStack API Backends: HAProxy forwards inbound requests to the appropriate
      OpenStack API backend services. Modeled to show the forwarding dependency on
      the full set of control plane services.
