label: proxies compute API requests
technology: HTTPS / HTTP
direction: synchronous
catalogStatus: complete
notes: nova-api listens on port 8774 on the control plane network. HAProxy frontend accepts HTTPS on the public endpoint and forwards to nova-api backends using HTTP.
