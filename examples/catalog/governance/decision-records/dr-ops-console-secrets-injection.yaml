linkedObject: 01KSE5V73Z-Q0A0
description: Documents the decision to inject application secrets into the OpenStack
  Ops Console at deploy time via the platform secret store, with no secrets present
  in source code or container images.
decisionRationale: The Ops Console requires two sensitive runtime values — OPS_CONSOLE_SECRET_KEY
  (session signing key) and SAML IDP credentials. Embedding these in source code
  or images creates a disclosure risk and complicates rotation. Injecting them at
  deploy time from the platform secret store keeps the image clean, centralises
  rotation, and aligns with the CC.SecurityCompliance.04.3.1 secrets management
  control. The secret store is the single point of truth for all sensitive runtime
  configuration across the OpenStack platform.
impact: All sensitive environment variables for the Ops Console must be provisioned
  in the platform secret store before each deployment. The deploy pipeline must have
  permission to read those secrets. Rotation requires a re-deployment or hot-reload
  depending on the secret type.
