unresolvedQuestions:
- id: Q1
  question: Does nova-scheduler run active-active across all three controller nodes,
    or is leader election used to ensure only one scheduler processes requests at
    a time?
  status: open
- id: Q2
  question: What is the failover behavior if a nova-conductor instance becomes
    unavailable mid-operation — does the in-flight RPC call fail or does another
    conductor pick it up?
  status: open
- id: Q3
  question: Is there a maximum number of concurrent live migrations configured,
    and is this limit enforced at the scheduler or conductor level?
  status: open
assumptions:
- id: A1
  statement: Nova API runs active-active behind HAProxy on all three controller
    nodes per the SDP service group definition.
  rationale: Consistent with the SDP presentation and application tier configuration.
  impact: If Nova API is not active-active, the availability model for the Nova
    runtime service object requires revision.
nextSteps:
- id: NS1
  action: Confirm nova-scheduler leader election behavior with the platform-engineering
    team and document the answer in an notes.schedulerElection key
    on the Nova runtime service.
  status: open
  owner: platform-engineering
- id: NS2
  action: Once Q1-Q3 are answered, author deploymentConfigurations entries for
    availability and scalability qualities on the Nova runtime service object.
  status: open
  owner: platform-engineering
- id: NS3
  action: Promote resolved availability decision to a decision_record object
    linked to the Nova runtime service.
  status: open
