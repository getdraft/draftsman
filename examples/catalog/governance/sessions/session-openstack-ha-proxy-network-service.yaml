unresolvedQuestions:
- id: Q1
  question: Is HAProxy deployed on dedicated load balancer VMs, or co-located on the same controller nodes as the
    OpenStack services?
  status: answered
  resolution: Co-located on controller nodes (STCK00000F-HS0F). The NetworkService object references the same host as
    the OpenStack runtime services.
- id: Q2
  question: Does HAProxy terminate TLS, or does TLS pass through to the backend services?
  status: answered
  resolution: TLS terminated at HAProxy. Backends use HTTP on the control plane network zone.
assumptions:
- id: A1
