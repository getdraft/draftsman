name: Validate Catalog

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependency
        run: python -m pip install pyyaml

      - name: Validate catalog
        run: python framework/tools/validate.py

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Check release notes and version bump
        run: python framework/tools/check_release_notes.py --base "$BASE_SHA" --head "$GITHUB_SHA"
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}

      - name: Verify generated indexes
        run: |
          python framework/tools/generate_indexes.py
          git diff --exit-code docs/assets/draft-indexes.json

      - name: Verify generated AI index
        run: |
          python framework/tools/generate_ai_index.py
          git diff --exit-code AI_INDEX.md

      - name: Create and push git tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          VERSION=$(python3 -c "import yaml; print(yaml.safe_load(open('draft-framework.yaml'))['version'])")
          TAG="v$VERSION"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "refs/tags/$TAG"; then
            echo "Tag $TAG already exists on remote. Skipping tag creation."
          else
            echo "Tag $TAG does not exist. Creating and pushing..."
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi
