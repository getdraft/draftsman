name: Validate Catalog

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependency
        run: python -m pip install pyyaml

      - name: Validate catalog
        run: python framework/tools/validate.py

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Check release notes and version bump
        run: python framework/tools/check_release_notes.py --base "$BASE_SHA" --head "$GITHUB_SHA"
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}

      - name: Verify generated AI index
        run: |
          python framework/tools/generate_ai_index.py
          git diff --exit-code AI_INDEX.md
