name: Generate Derived Assets

on:
  push:
    branches:
      - main
    paths:
      - "**/*.yaml"
      - "framework/docs/**"
      - "framework/browser/**"
      - "templates/**"
      - "framework/tools/generate_ai_index.py"
      - "framework/tools/generate_browser.py"
      - "AGENTS.md"
      - "README.md"
      - "llms.txt"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependency
        run: python -m pip install pyyaml

      - name: Generate browser
        run: python framework/tools/generate_browser.py --refresh-shell

      - name: Generate AI index
        run: python framework/tools/generate_ai_index.py

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/assets docs/user-manual.html AI_INDEX.md
          git diff --cached --quiet && exit 0
          git commit -m "chore: regenerate derived catalog assets [skip ci]"
          git push
