<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 670" width="900" height="670" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#5f564b"/>
    </marker>
    <marker id="arr-p" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#7c3a6b"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#1f8a5b"/>
    </marker>
  </defs>

  <!-- Architecture container -->
  <rect x="8" y="8" width="622" height="648" rx="12" fill="#eef4fc" stroke="#2a6fdb" stroke-width="1.5" stroke-dasharray="7 3"/>
  <text x="22" y="26" font-size="10" font-weight="700" letter-spacing="1.5" fill="#2a6fdb">ARCHITECTURE OBJECTS</text>

  <!-- Governance container -->
  <rect x="644" y="8" width="250" height="648" rx="12" fill="#f8f0f5" stroke="#7c3a6b" stroke-width="1.5" stroke-dasharray="7 3"/>
  <text x="658" y="26" font-size="10" font-weight="700" letter-spacing="1.5" fill="#7c3a6b">GOVERNANCE OBJECTS</text>

  <!-- ══ ROW 1: SoftwareDeploymentPattern ══ -->
  <rect x="165" y="44" width="244" height="72" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="165" y="44" width="244" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="165" y="64" width="244" height="6" fill="#2a6fdb"/>
  <text x="287" y="61" font-size="11" fill="white" text-anchor="middle" font-weight="700">SoftwareDeploymentPattern</text>
  <text x="287" y="83" font-size="9" fill="#5f564b" text-anchor="middle">serviceGroups . deployableObjects</text>
  <text x="287" y="95" font-size="9" fill="#5f564b" text-anchor="middle">connections . deploymentTargets</text>
  <text x="287" y="107" font-size="9" fill="#5f564b" text-anchor="middle">businessContext . decisions</text>

  <!-- ══ ROW 2: EdgeGatewayService | RuntimeService | DataStoreService ══ -->

  <!-- EdgeGatewayService -->
  <rect x="18" y="180" width="184" height="68" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="18" y="180" width="184" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="18" y="200" width="184" height="6" fill="#2a6fdb"/>
  <text x="110" y="197" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">EdgeGatewayService</text>
  <text x="110" y="218" font-size="9" fill="#5f564b" text-anchor="middle">WAF . API GW . LB . proxy</text>
  <text x="110" y="230" font-size="9" fill="#5f564b" text-anchor="middle">traffic management</text>
  <text x="110" y="242" font-size="8" fill="#888" text-anchor="middle" font-style="italic">not a code execution env</text>

  <!-- RuntimeService -->
  <rect x="214" y="180" width="184" height="68" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="214" y="180" width="184" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="214" y="200" width="184" height="6" fill="#2a6fdb"/>
  <text x="306" y="197" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">RuntimeService</text>
  <text x="306" y="218" font-size="9" fill="#5f564b" text-anchor="middle">web . app . worker</text>
  <text x="306" y="230" font-size="9" fill="#5f564b" text-anchor="middle">code execution environment</text>
  <text x="306" y="242" font-size="8" fill="#888" text-anchor="middle" font-style="italic">Host + TechComponent + ProductComponent</text>

  <!-- DataStoreService -->
  <rect x="410" y="180" width="202" height="68" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="410" y="180" width="202" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="410" y="200" width="202" height="6" fill="#2a6fdb"/>
  <text x="511" y="197" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">DataStoreService</text>
  <text x="511" y="218" font-size="9" fill="#5f564b" text-anchor="middle">database . file . object . search . cache</text>
  <text x="511" y="230" font-size="9" fill="#5f564b" text-anchor="middle">data dependency, not exec env</text>
  <text x="511" y="242" font-size="8" fill="#888" text-anchor="middle" font-style="italic">Host + TechComponent + DataComponent</text>

  <!-- ══ ROW 3: ProductComponent | DataComponent | TechnologyComponent | Host ══ -->

  <!-- ProductComponent -->
  <rect x="18" y="336" width="140" height="74" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="18" y="336" width="140" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="18" y="356" width="140" height="6" fill="#2a6fdb"/>
  <text x="88" y="353" font-size="10" fill="white" text-anchor="middle" font-weight="700">ProductComponent</text>
  <text x="88" y="373" font-size="9" fill="#5f564b" text-anchor="middle">first-party code</text>
  <text x="88" y="385" font-size="9" fill="#5f564b" text-anchor="middle">repoUrl . owner . classification</text>
  <text x="88" y="397" font-size="9" fill="#5f564b" text-anchor="middle">runtimeRequirement</text>

  <!-- DataComponent -->
  <rect x="168" y="336" width="140" height="74" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="168" y="336" width="140" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="168" y="356" width="140" height="6" fill="#2a6fdb"/>
  <text x="238" y="353" font-size="10" fill="white" text-anchor="middle" font-weight="700">DataComponent</text>
  <text x="238" y="373" font-size="9" fill="#5f564b" text-anchor="middle">first-party data artifacts</text>
  <text x="238" y="385" font-size="9" fill="#5f564b" text-anchor="middle">repoUrl . owner . targetEngine</text>
  <text x="238" y="397" font-size="9" fill="#5f564b" text-anchor="middle">dataClassification . containsPII</text>

  <!-- TechnologyComponent -->
  <rect x="318" y="336" width="166" height="74" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="318" y="336" width="166" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="318" y="356" width="166" height="6" fill="#2a6fdb"/>
  <text x="401" y="353" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">TechnologyComponent</text>
  <text x="401" y="373" font-size="9" fill="#5f564b" text-anchor="middle">vendor . productName . classification</text>
  <text x="401" y="385" font-size="9" fill="#5f564b" text-anchor="middle">configurations . networkBindings</text>
  <text x="401" y="397" font-size="9" fill="#5f564b" text-anchor="middle">capability implementations</text>

  <!-- Host -->
  <rect x="494" y="336" width="130" height="74" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="494" y="336" width="130" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="494" y="356" width="130" height="6" fill="#2a6fdb"/>
  <text x="559" y="353" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">Host</text>
  <text x="559" y="373" font-size="9" fill="#5f564b" text-anchor="middle">compute + OS platform</text>
  <text x="559" y="385" font-size="9" fill="#5f564b" text-anchor="middle">VM . container . bare metal</text>
  <text x="559" y="397" font-size="9" fill="#5f564b" text-anchor="middle">serverless</text>

  <!-- ══ GOVERNANCE OBJECTS (RA → Domain → Capability → RequirementGroup → DecisionRecord) ══ -->

  <!-- ReferenceArchitecture -->
  <rect x="653" y="36" width="182" height="60" rx="6" fill="white" stroke="#7c3a6b" stroke-width="1.5"/>
  <rect x="653" y="36" width="182" height="26" rx="6" fill="#7c3a6b"/>
  <rect x="653" y="56" width="182" height="6" fill="#7c3a6b"/>
  <text x="744" y="53" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">ReferenceArchitecture</text>
  <text x="744" y="74" font-size="9" fill="#5f564b" text-anchor="middle">pattern guidance . serviceGroups</text>
  <text x="744" y="86" font-size="9" fill="#5f564b" text-anchor="middle">metadata, not a deployed node</text>

  <!-- Domain -->
  <rect x="653" y="118" width="182" height="58" rx="6" fill="white" stroke="#7c3a6b" stroke-width="1.5"/>
  <rect x="653" y="118" width="182" height="26" rx="6" fill="#7c3a6b"/>
  <rect x="653" y="138" width="182" height="6" fill="#7c3a6b"/>
  <text x="744" y="135" font-size="11.5" fill="white" text-anchor="middle" font-weight="700">Domain</text>
  <text x="744" y="158" font-size="9" fill="#5f564b" text-anchor="middle">strategy grouping</text>

  <!-- Capability -->
  <rect x="653" y="198" width="182" height="58" rx="6" fill="white" stroke="#7c3a6b" stroke-width="1.5"/>
  <rect x="653" y="198" width="182" height="26" rx="6" fill="#7c3a6b"/>
  <rect x="653" y="218" width="182" height="6" fill="#7c3a6b"/>
  <text x="744" y="215" font-size="11.5" fill="white" text-anchor="middle" font-weight="700">Capability</text>
  <text x="744" y="238" font-size="9" fill="#5f564b" text-anchor="middle">auth . backup . logging . patch</text>

  <!-- RequirementGroup -->
  <rect x="653" y="278" width="182" height="78" rx="6" fill="white" stroke="#7c3a6b" stroke-width="1.5"/>
  <rect x="653" y="278" width="182" height="26" rx="6" fill="#7c3a6b"/>
  <rect x="653" y="298" width="182" height="6" fill="#7c3a6b"/>
  <text x="744" y="295" font-size="11" fill="white" text-anchor="middle" font-weight="700">RequirementGroup</text>
  <text x="744" y="318" font-size="9" fill="#5f564b" text-anchor="middle">always-on . workspace-mode</text>
  <text x="744" y="330" font-size="9" fill="#5f564b" text-anchor="middle">company . compliance</text>
  <text x="744" y="342" font-size="9" fill="#5f564b" text-anchor="middle">appliesTo . requirements</text>

  <!-- DecisionRecord -->
  <rect x="653" y="378" width="182" height="58" rx="6" fill="white" stroke="#7c3a6b" stroke-width="1.5"/>
  <rect x="653" y="378" width="182" height="26" rx="6" fill="#7c3a6b"/>
  <rect x="653" y="398" width="182" height="6" fill="#7c3a6b"/>
  <text x="744" y="395" font-size="11.5" fill="white" text-anchor="middle" font-weight="700">DecisionRecord</text>
  <text x="744" y="418" font-size="9" fill="#5f564b" text-anchor="middle">risk . decision . mitigation</text>

  <!-- ══ ARROWS ══ -->

  <!-- SDP → ReferenceArchitecture (dashed purple) -->
  <line x1="409" y1="78" x2="651" y2="66" stroke="#7c3a6b" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-p)"/>
  <text x="526" y="65" font-size="8.5" fill="#7c3a6b" text-anchor="middle" font-style="italic">referenceArchitecture</text>

  <!-- SDP → Row 2 services bus (serviceGroups.deployableObjects) -->
  <line x1="287" y1="116" x2="287" y2="154" stroke="#5f564b" stroke-width="1.5"/>
  <line x1="110" y1="154" x2="511" y2="154" stroke="#5f564b" stroke-width="1.5"/>
  <line x1="110" y1="154" x2="110" y2="178" stroke="#5f564b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="306" y1="154" x2="306" y2="178" stroke="#5f564b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="511" y1="154" x2="511" y2="178" stroke="#5f564b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="287" y="146" font-size="9" fill="#5f564b" text-anchor="middle" font-style="italic">serviceGroups.deployableObjects</text>

  <!-- ProductComponent → RuntimeService (green dashed, deploysTo) -->
  <line x1="88" y1="336" x2="252" y2="250" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-g)"/>
  <text x="148" y="290" font-size="8.5" fill="#1f8a5b" font-style="italic">deploysTo</text>

  <!-- DataComponent → DataStoreService (green dashed, deploysTo) -->
  <line x1="238" y1="336" x2="456" y2="250" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-g)"/>
  <text x="364" y="290" font-size="8.5" fill="#1f8a5b" font-style="italic">deploysTo</text>

  <!-- TechComponent + Host → services bus (component refs) -->
  <line x1="401" y1="336" x2="401" y2="292" stroke="#5f564b" stroke-width="1.2"/>
  <line x1="559" y1="336" x2="559" y2="292" stroke="#5f564b" stroke-width="1.2"/>
  <line x1="110" y1="292" x2="559" y2="292" stroke="#5f564b" stroke-width="1.2"/>
  <line x1="110" y1="292" x2="110" y2="250" stroke="#5f564b" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="306" y1="292" x2="306" y2="250" stroke="#5f564b" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="511" y1="292" x2="511" y2="250" stroke="#5f564b" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="490" y="284" font-size="9" fill="#5f564b" font-style="italic">component refs</text>

  <!-- TechnologyComponent → Capability (satisfies) -->
  <line x1="484" y1="374" x2="632" y2="374" stroke="#5f564b" stroke-width="1.5"/>
  <line x1="632" y1="374" x2="632" y2="227" stroke="#5f564b" stroke-width="1.5"/>
  <line x1="632" y1="227" x2="651" y2="227" stroke="#5f564b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="556" y="368" font-size="9" fill="#5f564b" font-style="italic">satisfies</text>

  <!-- Domain → groups → Capability -->
  <line x1="744" y1="198" x2="744" y2="178" stroke="#7c3a6b" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="762" y="192" font-size="9" fill="#7c3a6b" font-style="italic">groups</text>

  <!-- RequirementGroup → appliesTo → architecture -->
  <line x1="653" y1="317" x2="634" y2="317" stroke="#7c3a6b" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-p)"/>
  <text x="643" y="308" font-size="9" fill="#7c3a6b" text-anchor="middle" font-style="italic">appliesTo</text>

  <text x="450" y="662" font-size="11" fill="#5f564b" text-anchor="middle" font-weight="600">DRAFT Object Model - UML Class Diagram</text>
</svg>
