<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#5f564b"/>
    </marker>
    <marker id="arr-p" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#7c3a6b"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#1f8a5b"/>
    </marker>
  </defs>

  <!-- ══ ENGINEERING OBJECTS container ══ -->
  <rect x="8" y="8" width="622" height="116" rx="12" fill="#f0f7f8" stroke="#006064" stroke-width="1.5" stroke-dasharray="7 3"/>
  <text x="22" y="26" font-size="10" font-weight="700" letter-spacing="1.5" fill="#006064">ENGINEERING OBJECTS</text>

  <!-- ProductComponent -->
  <rect x="164" y="36" width="140" height="74" rx="6" fill="white" stroke="#006064" stroke-width="1.5"/>
  <rect x="164" y="36" width="140" height="26" rx="6" fill="#006064"/>
  <rect x="164" y="56" width="140" height="6" fill="#006064"/>
  <text x="234" y="53" font-size="10" fill="white" text-anchor="middle" font-weight="700">ProductComponent</text>
  <text x="234" y="73" font-size="9" fill="#5f564b" text-anchor="middle">first-party code</text>
  <text x="234" y="85" font-size="9" fill="#5f564b" text-anchor="middle">repoUrl · owner · classification</text>
  <text x="234" y="97" font-size="9" fill="#5f564b" text-anchor="middle">runtimeRequirement</text>

  <!-- DataComponent -->
  <rect x="334" y="36" width="140" height="74" rx="6" fill="white" stroke="#006064" stroke-width="1.5"/>
  <rect x="334" y="36" width="140" height="26" rx="6" fill="#006064"/>
  <rect x="334" y="56" width="140" height="6" fill="#006064"/>
  <text x="404" y="53" font-size="10" fill="white" text-anchor="middle" font-weight="700">DataComponent</text>
  <text x="404" y="73" font-size="9" fill="#5f564b" text-anchor="middle">first-party data artifacts</text>
  <text x="404" y="85" font-size="9" fill="#5f564b" text-anchor="middle">repoUrl · owner · targetEngine</text>
  <text x="404" y="97" font-size="9" fill="#5f564b" text-anchor="middle">dataClassification · containsPII</text>

  <!-- ══ ARCHITECTURE OBJECTS container ══ -->
  <rect x="8" y="132" width="622" height="322" rx="12" fill="#eef4fc" stroke="#2a6fdb" stroke-width="1.5" stroke-dasharray="7 3"/>
  <text x="22" y="150" font-size="10" font-weight="700" letter-spacing="1.5" fill="#2a6fdb">ARCHITECTURE OBJECTS</text>

  <!-- SoftwareDeploymentPattern -->
  <rect x="197" y="168" width="244" height="72" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="197" y="168" width="244" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="197" y="188" width="244" height="6" fill="#2a6fdb"/>
  <text x="319" y="185" font-size="11" fill="white" text-anchor="middle" font-weight="700">SoftwareDeploymentPattern</text>
  <text x="319" y="207" font-size="9" fill="#5f564b" text-anchor="middle">serviceGroups · deployableObjects</text>
  <text x="319" y="219" font-size="9" fill="#5f564b" text-anchor="middle">connections · deploymentTargets</text>
  <text x="319" y="231" font-size="9" fill="#5f564b" text-anchor="middle">businessContext · decisions</text>

  <!-- EdgeGatewayService -->
  <rect x="18" y="272" width="184" height="68" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="18" y="272" width="184" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="18" y="292" width="184" height="6" fill="#2a6fdb"/>
  <text x="110" y="289" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">EdgeGatewayService</text>
  <text x="110" y="310" font-size="9" fill="#5f564b" text-anchor="middle">WAF · API GW · LB · proxy</text>
  <text x="110" y="322" font-size="9" fill="#5f564b" text-anchor="middle">traffic management</text>
  <text x="110" y="334" font-size="8" fill="#888" text-anchor="middle" font-style="italic">not a code execution env</text>

  <!-- RuntimeService -->
  <rect x="214" y="272" width="184" height="68" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="214" y="272" width="184" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="214" y="292" width="184" height="6" fill="#2a6fdb"/>
  <text x="306" y="289" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">RuntimeService</text>
  <text x="306" y="310" font-size="9" fill="#5f564b" text-anchor="middle">web · app · worker</text>
  <text x="306" y="322" font-size="9" fill="#5f564b" text-anchor="middle">code execution environment</text>
  <text x="306" y="334" font-size="8" fill="#888" text-anchor="middle" font-style="italic">Host + TechComponent + ProductComponent</text>

  <!-- DataStoreService -->
  <rect x="410" y="272" width="202" height="68" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="410" y="272" width="202" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="410" y="292" width="202" height="6" fill="#2a6fdb"/>
  <text x="511" y="289" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">DataStoreService</text>
  <text x="511" y="310" font-size="9" fill="#5f564b" text-anchor="middle">database · file · object · search · cache</text>
  <text x="511" y="322" font-size="9" fill="#5f564b" text-anchor="middle">data dependency, not exec env</text>
  <text x="511" y="334" font-size="8" fill="#888" text-anchor="middle" font-style="italic">Host + TechComponent + DataComponent</text>

  <!-- TechnologyComponent -->
  <rect x="318" y="366" width="166" height="74" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="318" y="366" width="166" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="318" y="386" width="166" height="6" fill="#2a6fdb"/>
  <text x="401" y="383" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">TechnologyComponent</text>
  <text x="401" y="403" font-size="9" fill="#5f564b" text-anchor="middle">vendor · productName · classification</text>
  <text x="401" y="415" font-size="9" fill="#5f564b" text-anchor="middle">configurations · networkBindings</text>
  <text x="401" y="427" font-size="9" fill="#5f564b" text-anchor="middle">capability implementations</text>

  <!-- Host -->
  <rect x="494" y="366" width="130" height="74" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="494" y="366" width="130" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="494" y="386" width="130" height="6" fill="#2a6fdb"/>
  <text x="559" y="383" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">Host</text>
  <text x="559" y="403" font-size="9" fill="#5f564b" text-anchor="middle">compute + OS platform</text>
  <text x="559" y="415" font-size="9" fill="#5f564b" text-anchor="middle">VM · container · bare metal</text>
  <text x="559" y="427" font-size="9" fill="#5f564b" text-anchor="middle">serverless</text>

  <!-- ══ GOVERNANCE OBJECTS container (spans full height) ══ -->
  <rect x="644" y="8" width="250" height="446" rx="12" fill="#f8f0f5" stroke="#7c3a6b" stroke-width="1.5" stroke-dasharray="7 3"/>
  <text x="658" y="26" font-size="10" font-weight="700" letter-spacing="1.5" fill="#7c3a6b">GOVERNANCE OBJECTS</text>

  <!-- ReferenceArchitecture -->
  <rect x="653" y="36" width="182" height="60" rx="6" fill="white" stroke="#7c3a6b" stroke-width="1.5"/>
  <rect x="653" y="36" width="182" height="26" rx="6" fill="#7c3a6b"/>
  <rect x="653" y="56" width="182" height="6" fill="#7c3a6b"/>
  <text x="744" y="53" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">ReferenceArchitecture</text>
  <text x="744" y="74" font-size="9" fill="#5f564b" text-anchor="middle">pattern guidance · serviceGroups</text>
  <text x="744" y="86" font-size="9" fill="#5f564b" text-anchor="middle">metadata, not a deployed node</text>

  <!-- Domain -->
  <rect x="653" y="114" width="182" height="58" rx="6" fill="white" stroke="#7c3a6b" stroke-width="1.5"/>
  <rect x="653" y="114" width="182" height="26" rx="6" fill="#7c3a6b"/>
  <rect x="653" y="134" width="182" height="6" fill="#7c3a6b"/>
  <text x="744" y="131" font-size="11.5" fill="white" text-anchor="middle" font-weight="700">Domain</text>
  <text x="744" y="154" font-size="9" fill="#5f564b" text-anchor="middle">strategy grouping</text>

  <!-- Capability -->
  <rect x="653" y="190" width="182" height="58" rx="6" fill="white" stroke="#7c3a6b" stroke-width="1.5"/>
  <rect x="653" y="190" width="182" height="26" rx="6" fill="#7c3a6b"/>
  <rect x="653" y="210" width="182" height="6" fill="#7c3a6b"/>
  <text x="744" y="207" font-size="11.5" fill="white" text-anchor="middle" font-weight="700">Capability</text>
  <text x="744" y="230" font-size="9" fill="#5f564b" text-anchor="middle">auth · backup · logging · patch</text>

  <!-- RequirementGroup -->
  <rect x="653" y="266" width="182" height="78" rx="6" fill="white" stroke="#7c3a6b" stroke-width="1.5"/>
  <rect x="653" y="266" width="182" height="26" rx="6" fill="#7c3a6b"/>
  <rect x="653" y="286" width="182" height="6" fill="#7c3a6b"/>
  <text x="744" y="283" font-size="11" fill="white" text-anchor="middle" font-weight="700">RequirementGroup</text>
  <text x="744" y="306" font-size="9" fill="#5f564b" text-anchor="middle">always-on · workspace-mode</text>
  <text x="744" y="318" font-size="9" fill="#5f564b" text-anchor="middle">company · compliance</text>
  <text x="744" y="330" font-size="9" fill="#5f564b" text-anchor="middle">appliesTo · requirements</text>

  <!-- DecisionRecord -->
  <rect x="653" y="362" width="182" height="58" rx="6" fill="white" stroke="#7c3a6b" stroke-width="1.5"/>
  <rect x="653" y="362" width="182" height="26" rx="6" fill="#7c3a6b"/>
  <rect x="653" y="382" width="182" height="6" fill="#7c3a6b"/>
  <text x="744" y="379" font-size="11.5" fill="white" text-anchor="middle" font-weight="700">DecisionRecord</text>
  <text x="744" y="402" font-size="9" fill="#5f564b" text-anchor="middle">risk · decision · mitigation</text>

  <!-- ══ ARROWS ══ -->

  <!-- SDP → ReferenceArchitecture (dashed purple) -->
  <line x1="441" y1="196" x2="651" y2="66" stroke="#7c3a6b" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-p)"/>
  <text x="555" y="123" font-size="8.5" fill="#7c3a6b" text-anchor="middle" font-style="italic">referenceArchitecture</text>

  <!-- SDP → Row 2 services bus -->
  <line x1="319" y1="240" x2="319" y2="256" stroke="#5f564b" stroke-width="1.5"/>
  <line x1="110" y1="256" x2="511" y2="256" stroke="#5f564b" stroke-width="1.5"/>
  <line x1="110" y1="256" x2="110" y2="272" stroke="#5f564b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="306" y1="256" x2="306" y2="272" stroke="#5f564b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="511" y1="256" x2="511" y2="272" stroke="#5f564b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="319" y="251" font-size="9" fill="#5f564b" text-anchor="middle" font-style="italic">serviceGroups.deployableObjects</text>

  <!-- ProductComponent → RuntimeService (deploysTo)
       Routes: down through container gap, left of SDP, into RuntimeService top -->
  <line x1="234" y1="110" x2="234" y2="130" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="234" y1="130" x2="170" y2="130" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="170" y1="130" x2="170" y2="268" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="170" y1="268" x2="278" y2="268" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="278" y1="268" x2="278" y2="272" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-g)"/>
  <text x="202" y="124" font-size="8.5" fill="#1f8a5b" text-anchor="middle" font-style="italic">deploysTo</text>

  <!-- DataComponent → DataStoreService (deploysTo)
       Routes: down through container gap, right of SDP, into DataStoreService top -->
  <line x1="404" y1="110" x2="404" y2="130" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="404" y1="130" x2="460" y2="130" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="460" y1="130" x2="460" y2="268" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="460" y1="268" x2="511" y2="268" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="511" y1="268" x2="511" y2="272" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-g)"/>
  <text x="432" y="124" font-size="8.5" fill="#1f8a5b" text-anchor="middle" font-style="italic">deploysTo</text>

  <!-- TechComponent + Host → component refs bus → services -->
  <line x1="401" y1="366" x2="401" y2="354" stroke="#5f564b" stroke-width="1.2"/>
  <line x1="559" y1="366" x2="559" y2="354" stroke="#5f564b" stroke-width="1.2"/>
  <line x1="110" y1="354" x2="559" y2="354" stroke="#5f564b" stroke-width="1.2"/>
  <line x1="110" y1="354" x2="110" y2="340" stroke="#5f564b" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="306" y1="354" x2="306" y2="340" stroke="#5f564b" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="511" y1="354" x2="511" y2="340" stroke="#5f564b" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="490" y="347" font-size="9" fill="#5f564b" font-style="italic">component refs</text>

  <!-- TechnologyComponent → Capability (satisfies)
       Routes: down below Host, right to clear column, up to Capability -->
  <line x1="484" y1="403" x2="484" y2="452" stroke="#5f564b" stroke-width="1.5"/>
  <line x1="484" y1="452" x2="629" y2="452" stroke="#5f564b" stroke-width="1.5"/>
  <line x1="629" y1="452" x2="629" y2="219" stroke="#5f564b" stroke-width="1.5"/>
  <line x1="629" y1="219" x2="651" y2="219" stroke="#5f564b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="556" y="466" font-size="9" fill="#5f564b" text-anchor="middle" font-style="italic">satisfies</text>

  <!-- Domain → Capability (groups) -->
  <line x1="744" y1="172" x2="744" y2="188" stroke="#7c3a6b" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="762" y="184" font-size="9" fill="#7c3a6b" font-style="italic">groups</text>

  <!-- RequirementGroup → appliesTo → objects -->
  <line x1="653" y1="305" x2="634" y2="305" stroke="#7c3a6b" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-p)"/>
  <text x="643" y="296" font-size="9" fill="#7c3a6b" text-anchor="middle" font-style="italic">appliesTo</text>

  <text x="450" y="494" font-size="11" fill="#5f564b" text-anchor="middle" font-weight="600">DRAFT Object Model - UML Class Diagram</text>
</svg>
