<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#5f564b"/>
    </marker>
    <marker id="arr-p" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#7c3a6b"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#1f8a5b"/>
    </marker>
    <marker id="arr-e" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#006064"/>
    </marker>
  </defs>

  <!-- ══ ENGINEERING OBJECTS ══ -->
  <rect x="8" y="8" width="622" height="210" rx="12" fill="#f0f7f8" stroke="#006064" stroke-width="1.5" stroke-dasharray="7 3"/>
  <text x="22" y="26" font-size="10" font-weight="700" letter-spacing="1.5" fill="#006064">ENGINEERING OBJECTS</text>

  <!-- SoftwareDeploymentPattern -->
  <rect x="197" y="36" width="244" height="72" rx="6" fill="white" stroke="#006064" stroke-width="1.5"/>
  <rect x="197" y="36" width="244" height="26" rx="6" fill="#006064"/>
  <rect x="197" y="56" width="244" height="6" fill="#006064"/>
  <text x="319" y="53" font-size="11" fill="white" text-anchor="middle" font-weight="700">SoftwareDeploymentPattern</text>
  <text x="319" y="73" font-size="9" fill="#5f564b" text-anchor="middle">serviceGroups · deployableObjects</text>
  <text x="319" y="85" font-size="9" fill="#5f564b" text-anchor="middle">connections · deploymentTargets</text>
  <text x="319" y="97" font-size="9" fill="#5f564b" text-anchor="middle">businessContext · decisions</text>

  <!-- ProductComponent -->
  <rect x="169" y="122" width="140" height="74" rx="6" fill="white" stroke="#006064" stroke-width="1.5"/>
  <rect x="169" y="122" width="140" height="26" rx="6" fill="#006064"/>
  <rect x="169" y="142" width="140" height="6" fill="#006064"/>
  <text x="239" y="139" font-size="10" fill="white" text-anchor="middle" font-weight="700">ProductComponent</text>
  <text x="239" y="159" font-size="9" fill="#5f564b" text-anchor="middle">first-party code</text>
  <text x="239" y="171" font-size="9" fill="#5f564b" text-anchor="middle">repoUrl · owner · classification</text>
  <text x="239" y="183" font-size="9" fill="#5f564b" text-anchor="middle">runtimeRequirement</text>

  <!-- DataComponent -->
  <rect x="329" y="122" width="140" height="74" rx="6" fill="white" stroke="#006064" stroke-width="1.5"/>
  <rect x="329" y="122" width="140" height="26" rx="6" fill="#006064"/>
  <rect x="329" y="142" width="140" height="6" fill="#006064"/>
  <text x="404" y="139" font-size="10" fill="white" text-anchor="middle" font-weight="700">DataComponent</text>
  <text x="404" y="159" font-size="9" fill="#5f564b" text-anchor="middle">first-party data artifacts</text>
  <text x="404" y="171" font-size="9" fill="#5f564b" text-anchor="middle">repoUrl · owner · targetEngine</text>
  <text x="404" y="183" font-size="9" fill="#5f564b" text-anchor="middle">dataClassification · containsPII</text>

  <!-- ══ ARCHITECTURE OBJECTS ══ -->
  <rect x="8" y="226" width="622" height="224" rx="12" fill="#eef4fc" stroke="#2a6fdb" stroke-width="1.5" stroke-dasharray="7 3"/>
  <text x="22" y="244" font-size="10" font-weight="700" letter-spacing="1.5" fill="#2a6fdb">ARCHITECTURE OBJECTS</text>

  <!-- EdgeGatewayService -->
  <rect x="18" y="260" width="184" height="68" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="18" y="260" width="184" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="18" y="280" width="184" height="6" fill="#2a6fdb"/>
  <text x="110" y="277" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">EdgeGatewayService</text>
  <text x="110" y="298" font-size="9" fill="#5f564b" text-anchor="middle">WAF · API GW · LB · proxy</text>
  <text x="110" y="310" font-size="9" fill="#5f564b" text-anchor="middle">traffic management</text>
  <text x="110" y="322" font-size="8" fill="#888" text-anchor="middle" font-style="italic">not a code execution env</text>

  <!-- RuntimeService -->
  <rect x="214" y="260" width="184" height="68" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="214" y="260" width="184" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="214" y="280" width="184" height="6" fill="#2a6fdb"/>
  <text x="306" y="277" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">RuntimeService</text>
  <text x="306" y="298" font-size="9" fill="#5f564b" text-anchor="middle">web · app · worker</text>
  <text x="306" y="310" font-size="9" fill="#5f564b" text-anchor="middle">code execution environment</text>
  <text x="306" y="322" font-size="8" fill="#888" text-anchor="middle" font-style="italic">Host + TechComponent + ProductComponent</text>

  <!-- DataStoreService -->
  <rect x="410" y="260" width="202" height="68" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="410" y="260" width="202" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="410" y="280" width="202" height="6" fill="#2a6fdb"/>
  <text x="511" y="277" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">DataStoreService</text>
  <text x="511" y="298" font-size="9" fill="#5f564b" text-anchor="middle">database · file · object · search · cache</text>
  <text x="511" y="310" font-size="9" fill="#5f564b" text-anchor="middle">data dependency, not exec env</text>
  <text x="511" y="322" font-size="8" fill="#888" text-anchor="middle" font-style="italic">Host + TechComponent + DataComponent</text>

  <!-- TechnologyComponent -->
  <rect x="318" y="354" width="166" height="74" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="318" y="354" width="166" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="318" y="374" width="166" height="6" fill="#2a6fdb"/>
  <text x="401" y="371" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">TechnologyComponent</text>
  <text x="401" y="391" font-size="9" fill="#5f564b" text-anchor="middle">vendor · productName · classification</text>
  <text x="401" y="403" font-size="9" fill="#5f564b" text-anchor="middle">configurations · networkBindings</text>
  <text x="401" y="415" font-size="9" fill="#5f564b" text-anchor="middle">capability implementations</text>

  <!-- Host -->
  <rect x="494" y="354" width="130" height="74" rx="6" fill="white" stroke="#2a6fdb" stroke-width="1.5"/>
  <rect x="494" y="354" width="130" height="26" rx="6" fill="#2a6fdb"/>
  <rect x="494" y="374" width="130" height="6" fill="#2a6fdb"/>
  <text x="559" y="371" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">Host</text>
  <text x="559" y="391" font-size="9" fill="#5f564b" text-anchor="middle">compute + OS platform</text>
  <text x="559" y="403" font-size="9" fill="#5f564b" text-anchor="middle">VM · container · bare metal</text>
  <text x="559" y="415" font-size="9" fill="#5f564b" text-anchor="middle">serverless</text>

  <!-- ══ GOVERNANCE OBJECTS ══ -->
  <rect x="644" y="8" width="250" height="442" rx="12" fill="#f8f0f5" stroke="#7c3a6b" stroke-width="1.5" stroke-dasharray="7 3"/>
  <text x="658" y="26" font-size="10" font-weight="700" letter-spacing="1.5" fill="#7c3a6b">GOVERNANCE OBJECTS</text>

  <!-- ReferenceArchitecture -->
  <rect x="653" y="36" width="182" height="60" rx="6" fill="white" stroke="#7c3a6b" stroke-width="1.5"/>
  <rect x="653" y="36" width="182" height="26" rx="6" fill="#7c3a6b"/>
  <rect x="653" y="56" width="182" height="6" fill="#7c3a6b"/>
  <text x="744" y="53" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">ReferenceArchitecture</text>
  <text x="744" y="74" font-size="9" fill="#5f564b" text-anchor="middle">pattern guidance · serviceGroups</text>
  <text x="744" y="86" font-size="9" fill="#5f564b" text-anchor="middle">metadata, not a deployed node</text>

  <!-- Domain -->
  <rect x="653" y="106" width="182" height="58" rx="6" fill="white" stroke="#7c3a6b" stroke-width="1.5"/>
  <rect x="653" y="106" width="182" height="26" rx="6" fill="#7c3a6b"/>
  <rect x="653" y="126" width="182" height="6" fill="#7c3a6b"/>
  <text x="744" y="123" font-size="11.5" fill="white" text-anchor="middle" font-weight="700">Domain</text>
  <text x="744" y="146" font-size="9" fill="#5f564b" text-anchor="middle">strategy grouping</text>

  <!-- Capability -->
  <rect x="653" y="172" width="182" height="58" rx="6" fill="white" stroke="#7c3a6b" stroke-width="1.5"/>
  <rect x="653" y="172" width="182" height="26" rx="6" fill="#7c3a6b"/>
  <rect x="653" y="192" width="182" height="6" fill="#7c3a6b"/>
  <text x="744" y="189" font-size="11.5" fill="white" text-anchor="middle" font-weight="700">Capability</text>
  <text x="744" y="212" font-size="9" fill="#5f564b" text-anchor="middle">auth · backup · logging · patch</text>

  <!-- RequirementGroup -->
  <rect x="653" y="238" width="182" height="78" rx="6" fill="white" stroke="#7c3a6b" stroke-width="1.5"/>
  <rect x="653" y="238" width="182" height="26" rx="6" fill="#7c3a6b"/>
  <rect x="653" y="258" width="182" height="6" fill="#7c3a6b"/>
  <text x="744" y="255" font-size="11" fill="white" text-anchor="middle" font-weight="700">RequirementGroup</text>
  <text x="744" y="278" font-size="9" fill="#5f564b" text-anchor="middle">always-on · workspace-mode</text>
  <text x="744" y="290" font-size="9" fill="#5f564b" text-anchor="middle">company · compliance</text>
  <text x="744" y="302" font-size="9" fill="#5f564b" text-anchor="middle">appliesTo · requirements</text>

  <!-- Requirement -->
  <rect x="653" y="324" width="182" height="58" rx="6" fill="white" stroke="#7c3a6b" stroke-width="1.5"/>
  <rect x="653" y="324" width="182" height="26" rx="6" fill="#7c3a6b"/>
  <rect x="653" y="344" width="182" height="6" fill="#7c3a6b"/>
  <text x="744" y="341" font-size="11.5" fill="white" text-anchor="middle" font-weight="700">Requirement</text>
  <text x="744" y="362" font-size="9" fill="#5f564b" text-anchor="middle">id · description · rationale</text>
  <text x="744" y="374" font-size="9" fill="#5f564b" text-anchor="middle">mode · naAllowed</text>

  <!-- DecisionRecord -->
  <rect x="653" y="390" width="182" height="58" rx="6" fill="white" stroke="#7c3a6b" stroke-width="1.5"/>
  <rect x="653" y="390" width="182" height="26" rx="6" fill="#7c3a6b"/>
  <rect x="653" y="410" width="182" height="6" fill="#7c3a6b"/>
  <text x="744" y="407" font-size="11.5" fill="white" text-anchor="middle" font-weight="700">DecisionRecord</text>
  <text x="744" y="430" font-size="9" fill="#5f564b" text-anchor="middle">risk · decision · mitigation</text>

  <!-- ══ ARROWS ══ -->

  <!-- SDP → ReferenceArchitecture (governed by) -->
  <line x1="441" y1="66" x2="651" y2="60" stroke="#7c3a6b" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-p)"/>
  <text x="552" y="56" font-size="8.5" fill="#7c3a6b" text-anchor="middle" font-style="italic">referenceArchitecture</text>

  <!-- SDP → Architecture Objects (serviceGroups stub) -->
  <line x1="319" y1="108" x2="319" y2="224" stroke="#006064" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr-e)"/>
  <text x="332" y="170" font-size="8.5" fill="#006064" font-style="italic">serviceGroups</text>

  <!-- ProductComponent → RuntimeService (deploysTo) -->
  <line x1="239" y1="196" x2="239" y2="253" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="239" y1="253" x2="278" y2="253" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="278" y1="253" x2="278" y2="260" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-g)"/>
  <text x="208" y="228" font-size="8.5" fill="#1f8a5b" font-style="italic">deploysTo</text>

  <!-- DataComponent → DataStoreService (deploysTo) -->
  <line x1="404" y1="196" x2="404" y2="256" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="404" y1="256" x2="490" y2="256" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="490" y1="256" x2="490" y2="260" stroke="#1f8a5b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-g)"/>
  <text x="373" y="228" font-size="8.5" fill="#1f8a5b" font-style="italic">deploysTo</text>

  <!-- TechComponent + Host → component refs bus → services -->
  <line x1="401" y1="354" x2="401" y2="342" stroke="#5f564b" stroke-width="1.2"/>
  <line x1="559" y1="354" x2="559" y2="342" stroke="#5f564b" stroke-width="1.2"/>
  <line x1="110" y1="342" x2="559" y2="342" stroke="#5f564b" stroke-width="1.2"/>
  <line x1="110" y1="342" x2="110" y2="328" stroke="#5f564b" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="306" y1="342" x2="306" y2="328" stroke="#5f564b" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="511" y1="342" x2="511" y2="328" stroke="#5f564b" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="490" y="335" font-size="9" fill="#5f564b" font-style="italic">component refs</text>

  <!-- TechnologyComponent → Capability (satisfies)
       Routes: down below Host, right to clear column, up to Capability -->
  <line x1="484" y1="391" x2="484" y2="440" stroke="#5f564b" stroke-width="1.5"/>
  <line x1="484" y1="440" x2="629" y2="440" stroke="#5f564b" stroke-width="1.5"/>
  <line x1="629" y1="440" x2="629" y2="201" stroke="#5f564b" stroke-width="1.5"/>
  <line x1="629" y1="201" x2="651" y2="201" stroke="#5f564b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="550" y="435" font-size="9" fill="#5f564b" font-style="italic" text-anchor="middle">satisfies</text>

  <!-- Domain → Capability (groups) -->
  <line x1="744" y1="164" x2="744" y2="170" stroke="#7c3a6b" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="762" y="170" font-size="9" fill="#7c3a6b" font-style="italic">groups</text>

  <!-- RequirementGroup → Requirement (contains) -->
  <line x1="744" y1="316" x2="744" y2="322" stroke="#7c3a6b" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="762" y="322" font-size="9" fill="#7c3a6b" font-style="italic">contains</text>

  <!-- RequirementGroup → appliesTo → objects -->
  <line x1="653" y1="277" x2="634" y2="277" stroke="#7c3a6b" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-p)"/>
  <text x="643" y="268" font-size="9" fill="#7c3a6b" text-anchor="middle" font-style="italic">appliesTo</text>

  <text x="450" y="464" font-size="11" fill="#5f564b" text-anchor="middle" font-weight="600">DRAFT Object Model - UML Class Diagram</text>
</svg>
