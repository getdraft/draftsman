schemaVersion: '1.0'
type: software_deployment_pattern
requiredFields:
- schemaVersion
- uid
- type
- name
- catalogStatus
- lifecycleStatus
optionalFields:
- aliases
- description
- version
- owner
- tags
- businessContext
- followsReferenceArchitecture
- architecturalDecisions
- scalingUnits
- networkZones
- serviceGroups
- externalInteractions
- decisionRecords
- requirementGroups
- requirementImplementations
enumFields:
  catalogStatus:
  - stub
  - draft
  - approved
  lifecycleStatus:
  - candidate
  - preferred
  - existing-only
  - deprecated
  - retired
fieldTypes:
  aliases: list
  owner: dict
  tags: list
  businessContext: dict
  architecturalDecisions: dict
architecturalDecisions:
  optionalFields:
  - availabilityTarget
  - availabilityRequirement
  - dataClassification
  - failureDomain
  - patternDeviations
  fieldTypes:
    failureDomain: dict
  fieldDescriptions:
    availabilityTarget: >
      Structured availability target expressed as a percentage string (e.g. "99.9%",
      "99.95%", "99.99%"). Use alongside availabilityRequirement for the human-readable
      narrative if needed.
    failureDomain: >
      Structured failure domain describing the blast radius of a component or service
      failure. Use scope for the controlled-vocabulary tier and description for the
      human-readable narrative.
  failureDomain:
    optionalFields:
    - scope
    - description
    enumFields:
      scope:
      - platform-wide
      - service-group
      - component
      - isolated
    fieldDescriptions:
      scope: >
        Controlled-vocabulary blast-radius tier. platform-wide = failure affects all
        tenants or all services; service-group = failure isolates to one deployment
        group; component = failure isolates to one service or process; isolated =
        failure has no impact beyond the component itself (e.g. optional telemetry).
      description: Human-readable narrative elaborating on the failure domain scope.
  scalingUnits: list
  networkZones: list
  serviceGroups: list
  externalInteractions: list
  decisionRecords: list
  requirementGroups: list
  requirementImplementations: list
collectionSchemas:
  scalingUnits: scalingUnit
  networkZones: networkZone
  serviceGroups: serviceGroup
  externalInteractions: externalInteraction
  decisionRecords: decisionRecordRef
  requirementImplementations: requirementImplementation
scalingUnit:
  requiredFields:
  - name
  - type
  optionalFields:
  - instanceCount
  - notes
  enumFields:
    type:
    - replicable
    - shared
networkZone:
  requiredFields:
  - id
  - name
  optionalFields:
  - description
  aiHint: >
    A network zone is a logical traffic boundary within a deployment — for example
    a public-facing network, private API network, or management plane. Use workspace
    vocabulary list networkZones for approved zone IDs. Common patterns: public /
    private / management; tenant / platform / management; dmz / internal / data.
serviceGroup:
  requiredFields:
  - name
  - deploymentTarget
  optionalFields:
  - deploymentTarget
  - scalingUnit
  - deployableObjects
  - externalInteractions
  - connections
  fieldTypes:
    deployableObjects: list
    externalInteractions: list
    connections: list
  collectionSchemas:
    deployableObjects: deployableObjectEntry
    externalInteractions: externalInteraction
    connections: serviceConnection
deployableObjectEntry:
  requiredFields:
  - ref
  optionalFields:
  - diagramTier
  - networkZone
  - intent
  - instance
  - riskRef
  - notes
  enumFields:
    diagramTier:
    - presentation
    - application
    - data
    - utility
  intent:
    - ha
    - sa
  fieldDescriptions:
    networkZone: >
      ID of a networkZone declared on this SDP. If omitted the Draftsman infers the
      zone from diagramTier using the workspace zone pattern. Only record explicitly
      when the service is in a different zone than its tier default.
serviceConnection:
  requiredFields:
  - from
  - to
  - protocol
  optionalFields:
  - direction
  - port
  - label
  enumFields:
    protocol:
    - REST
    - gRPC
    - AMQP
    - JDBC
    - SQL
    - WebSocket
    - HTTPS
    - GraphQL
    - other
    direction:
    - outbound
    - inbound
    - bidirectional
  fieldDescriptions:
    from: UID of a deployable object ref declared in this serviceGroup's deployableObjects.
    to: UID of a deployable object ref anywhere in this SDP (may be in another serviceGroup).
    protocol: Communication protocol. Use workspace vocabulary list connectionProtocols for approved values.
    direction: Direction from the perspective of the `from` object. Defaults to outbound.
    port: Optional port or port range. Do not ask the engineer for this during a Draftsman session; capture only if volunteered.
    label: Optional human label for this edge. Do not ask during a Draftsman session; capture only if volunteered.
  aiHint: >
    Capture only primary paths that cross a tier boundary (e.g. presentation→application)
    or a network zone boundary. Do not attempt to enumerate all internal same-tier
    connections during a single Draftsman session. Use the propose-and-confirm pattern:
    infer likely crossings from diagramTier, ask yes/no per tier crossing, then
    multi-select the specific services involved, then ask protocol once per crossing.
externalInteraction:
  requiredFields:
  - name
  optionalFields:
  - type
  - ref
  - capabilities
  - notes
  enumFields:
    type:
    - internal
    - external
  fieldTypes:
    capabilities: list
decisionRecordRef:
  requiredFields:
  - ref
requirementImplementation:
  requiredFields:
  - requirementGroup
  - requirementId
  - status
  optionalFields:
  - mechanism
  - key
  - equals
  - criteria
  - ref
  - notes
  fieldDescriptions:
    requirementGroup: Reference the requirement_group object that owns this requirement.
    requirementId: Reference the requirement id within the requirement group.
    status: Use satisfied, not-applicable, or not-compliant to record the object disposition.
  enumFields:
    status:
    - satisfied
    - not-applicable
    - not-compliant
    mechanism:
    - technologyComponent
    - technologyComponentConfiguration
    - deploymentConfiguration
    - externalInteraction
    - internalComponent
    - architecturalDecision
    - field
  fieldTypes:
    criteria: dict
aiHint: A Software Deployment Pattern describes intended product deployment architecture in terms of deployable objects, topology, decisions, and risks.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally "1.0".
  type: Use the exact object type declared by the matching schema.
  name: Use a clear human-readable name for the object.
  catalogStatus: Use stub, draft, or approved to describe catalog maturity, not company adoption disposition.
  lifecycleStatus: Use candidate, preferred, existing-only, deprecated, or retired where this object still carries a lifecycle signal.
  businessContext: Use workspace-defined business taxonomy values, especially businessContext.pillar, to identify which company portfolio or pillar owns this deployment pattern.
  uid: Use the generated opaque UID for object identity. Do not edit it for display-name, product-name, or taxonomy changes.
  aliases: List prior or alternate human-readable names that should resolve to this object.
uidPattern: ^[0-9A-HJKMNP-TV-Z]{10}-[0-9A-HJKMNP-TV-Z]{4}$
