schemaVersion: '1.0'
type: requirement_group
defaultOwnerRole: draft-admin
aiHint: A RequirementGroup is the unified authoring and validation contract an AI uses for always-on object requirements and workspace-activated compliance requirements.
requiredFields:
- schemaVersion
- uid
- type
- name
- description
- catalogStatus
- activation
- appliesTo
- requirements
optionalFields:
- aliases
- version
- tags
- owner
- lifecycleStatus
- provider
- authority
- notes
- inherits
- appliesToQualifiers
enumFields:
  catalogStatus:
  - stub
  - incomplete
  - complete
  activation:
  - always
  - workspace
  lifecycleStatus:
  - candidate
  - preferred
  - existing-only
  - deprecated
  - retired
fieldTypes:
  aliases: list
  owner: dict
  tags: list
  provider: dict
  authority: dict
  appliesTo: list
  requirements: list
  appliesToQualifiers: dict
collectionSchemas:
  requirements: requirement
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally "1.0".
  type: Use requirement_group.
  name: Name the authoring or control group.
  description: Explain what this group requires and when the Draftsman should apply it.
  catalogStatus: Use catalog maturity for the requirement group definition.
  owner: Identify the team accountable for maintaining this requirement group.
  authority: Identify the source authority for external or framework-owned requirements; use authority.shortName as the human citation prefix, such as SOC 2, NIST CSF, TX-RAMP, or DRAFT Security.
  activation: Use always for base authoring requirements or workspace for explicitly activated compliance/control groups.
  appliesTo: List object types governed by this group.
  requirements: List the requirement entries the Draftsman asks and the validator checks.
  uid: Use the generated opaque UID for object identity. Do not edit it for display-name, product-name, or taxonomy changes.
  aliases: List prior or alternate human-readable names that should resolve to this object.
requirement:
  requiredFields:
  - id
  - description
  - requirementMode
  - naAllowed
  - canBeSatisfiedBy
  - minimumSatisfactions
  - validAnswerTypes
  optionalFields:
  - name
  - rationale
  - relatedCapability
  - appliesTo
  - applicability
  - externalControlId
  - externalReference
  - notes
  fieldDescriptions:
    id: Use a unique requirement ID within this group.
    description: Write the question or required answer in actionable language.
    requirementMode: Use mandatory for always-in-scope requirements or conditional for requirements with applicability logic.
    naAllowed: Use true only when the requirement can be recorded as not applicable.
    canBeSatisfiedBy: List the mechanisms that can satisfy this requirement.
    minimumSatisfactions: Set how many mechanisms must resolve for the requirement to be satisfied.
    validAnswerTypes: List the allowed mechanisms for object-level requirement implementation evidence.
  enumFields:
    requirementMode:
    - mandatory
    - conditional
  fieldTypes:
    canBeSatisfiedBy: list
    validAnswerTypes: list
    appliesTo: list
    applicability: dict
uidPattern: ^[0-9A-HJKMNP-TV-Z]{10}-[0-9A-HJKMNP-TV-Z]{4}$
