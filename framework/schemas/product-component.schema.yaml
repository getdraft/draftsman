schemaVersion: '1.0'
type: product_component
requiredFields:
- schemaVersion
- uid
- type
- name
- repoUrl
- owner
- classification
- catalogStatus
defaultOwnerRole: engineering
optionalFields:
- lifecycleStatus
- aliases
- description
- version
- tags
- runsOn
- language
- interfaces
- networkBindings
- environmentConfiguration
- runtimeSpec
- architectureNotes
- notes
- decisionRecords
- requirementImplementations
enumFields:
  catalogStatus:
  - stub
  - incomplete
  - complete
  lifecycleStatus:
  - candidate
  - preferred
  - existing-only
  - deprecated
  - retired
  classification:
  - web-application
  - api-service
  - worker
  - library
  - cli
  - other
fieldTypes:
  aliases: list
  owner: dict
  runsOn: str
  tags: list
  interfaces: list
  networkBindings: list
  environmentConfiguration: list
  runtimeSpec: dict
  architectureNotes: dict
  requirementGroups: list
  decisionRecords: list
  requirementImplementations: list
collectionSchemas:
  interfaces: interface
  networkBindings: networkBinding
  environmentConfiguration: environmentVariable
  decisionRecords: decisionRecordRef
  requirementImplementations: requirementImplementation
dictSubSchemas:
  runtimeSpec: runtimeSpec
runtimeSpec:
  optionalFields:
  - ports
  - dependencies
  fieldTypes:
    ports: list
    dependencies: list
  collectionSchemas:
    ports: runtimePort
    dependencies: runtimeDependency
runtimePort:
  requiredFields:
  - number
  - protocol
  optionalFields:
  - name
  - direction
  - description
  enumFields:
    direction:
    - inbound
    - outbound
    - bidirectional
  fieldTypes:
    number: int
    protocol: str
    name: str
    direction: str
    description: str
  fieldDescriptions:
    number: Record the application port number exposed or consumed by this component.
    protocol: Record the application protocol such as HTTP, HTTPS, gRPC, TCP, UDP, AMQP, or other.
    name: Name the port or listener, such as web, metrics, admin, or grpc.
    direction: Use inbound, outbound, or bidirectional when the traffic direction is known.
    description: Explain the purpose of this runtime port.
runtimeDependency:
  requiredFields:
  - ref
  - purpose
  optionalFields:
  - interface
  - notes
  fieldTypes:
    ref: str
    purpose: str
    interface: str
    notes: str
  fieldDescriptions:
    ref: Reference the catalog UID for the service, data store, network service, component, or other object this component depends on.
    purpose: Explain why this component depends on the referenced object.
    interface: Name the consumed API, topic, queue, bucket, or configuration surface when known.
    notes: Add extra runtime dependency context that does not belong in a Relationship object.
interface:
  requiredFields:
  - name
  - protocol
  optionalFields:
  - path
  - authenticationModel
  - description
  enumFields:
    protocol:
    - REST
    - gRPC
    - GraphQL
    - WebSocket
    - AMQP
    - SMTP
    - other
    authenticationModel:
    - iam
    - api-key
    - oauth
    - saml
    - other
    - TBD
  fieldTypes:
    name: str
    path: str
    protocol: str
    authenticationModel: str
    description: str
  fieldDescriptions:
    name: Name the interface or API surface exposed by this component.
    path: Record the route, topic, queue, or address when one exists.
    protocol: Use REST, gRPC, GraphQL, WebSocket, AMQP, SMTP, or other.
    authenticationModel: Use the authentication model that applies to this interface.
    description: Describe the purpose or consumer-facing behavior of this interface.
networkBinding:
  requiredFields:
  - port
  - protocol
  - direction
  optionalFields:
  - description
  enumFields:
    direction:
    - inbound
    - outbound
    - bidirectional
  fieldTypes:
    port: int
    protocol: str
    direction: str
    description: str
  fieldDescriptions:
    port: Record the port defined by this component's own configuration.
    protocol: Record the protocol name such as HTTPS, gRPC, TCP, or AMQP.
    direction: Use inbound, outbound, or bidirectional.
    description: Explain the purpose of this network binding.
environmentVariable:
  requiredFields:
  - name
  optionalFields:
  - description
  - required
  - sensitive
  fieldTypes:
    name: str
    description: str
    required: bool
    sensitive: bool
  fieldDescriptions:
    name: Name the environment variable or configuration key required by this component.
    description: Describe the purpose of this configuration value.
    required: Set true when this variable must be present for the component to start.
    sensitive: Set true when this variable holds a secret, key, token, or credential.
requirementImplementation:
  requiredFields:
  - requirementGroup
  - requirementId
  - status
  optionalFields:
  - mechanism
  - key
  - equals
  - criteria
  - ref
  - notes
  enumFields:
    status:
    - satisfied
    - not-applicable
    - not-compliant
    mechanism:
    - decisionRecord
    - field
  fieldTypes:
    criteria: dict
aiHint: A ProductComponent is first-party code authored by the organization and deployed onto a RuntimeService or Host. It is the first-party peer of TechnologyComponent. Define interfaces, network bindings, and environment configuration here when they are declared by the component itself, not by the runtime or infrastructure layer.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally "1.0".
  uid: Use the generated opaque UID for object identity. Do not edit it for display-name changes.
  type: Use product_component exactly.
  name: Use a clear human-readable name for this component.
  repoUrl: Record the source repository URL where this component's code is maintained.
  owner: Declare the team that authors and maintains this component.
  runsOn: >
    UID of the RuntimeService or Host this component is
    deployed on. Optional when the hosting runtime is declared via the serviceGroup
    substrate field in every SDP that references this component — the SDP is the
    canonical deployment context. Set runsOn when a single unambiguous host exists
    across all deployment contexts, or when a Draftsman session cannot yet confirm
    the SDP placement.
  classification: Choose the one classification that best describes this component's role.
  language: Record the primary programming language or platform (e.g., TypeScript, Python, Java, Go, .NET).
  interfaces: List the APIs, events, or protocol surfaces this component exposes, when defined by the component itself.
  networkBindings: List ports this component opens as defined by its own configuration, not by the runtime infrastructure.
  environmentConfiguration: List environment variables or configuration keys this component requires at runtime.
  runtimeSpec: >
    Optional self-service runtime metadata owned by the product team. Use ports
    for application listeners or egress bindings declared by the component, and
    dependencies for simple runtime dependencies such as configuration stores,
    queues, buckets, APIs, or platform services consumed by this component.
  catalogStatus: Use stub, incomplete, or complete to describe catalog maturity.
  lifecycleStatus: Use candidate, preferred, existing-only, deprecated, or retired.
  aliases: List prior or alternate names for this component.
uidPattern: ^[0-9A-HJKMNP-TV-Z]{10}-[0-9A-HJKMNP-TV-Z]{4}$
