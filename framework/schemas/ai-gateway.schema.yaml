schemaVersion: '1.0'
type: ai_gateway
requiredFields:
- schemaVersion
- uid
- type
- name
- deliveryModel
- catalogStatus
- lifecycleStatus
defaultOwnerRole: shared-services
optionalFields:
- aliases
- description
- version
- owner
- tags
- host
- primaryTechnologyComponent
- internalComponents
- deploymentConfigurations
- vendor
- productName
- productVersion
- capabilities
- configurations
- authenticationModel
- patchingOwner
- vendorGovernance
- architectureNotes
- notes
- decisionRecords
- requirementImplementations
conditionalRequired:
- when:
    deliveryModel:
    - saas
    - paas
    - appliance
  require:
  - vendor
  - productName
  - productVersion
enumFields:
  catalogStatus:
  - stub
  - incomplete
  - complete
  lifecycleStatus:
  - candidate
  - preferred
  - existing-only
  - deprecated
  - retired
  deliveryModel:
  - self-managed
  - paas
  - saas
  - appliance
  patchingOwner:
  - provider-managed
  - organization-scheduled
  - vendor-managed
  - aws-managed
  authenticationModel:
  - iam
  - api-key
  - oauth
  - saml
  - other
  - TBD
fieldTypes:
  aliases: list
  owner: dict
  tags: list
  internalComponents: list
  deploymentConfigurations: list
  capabilities: list
  configurations: list
  architectureNotes: dict
  vendorGovernance: dict
  requirementGroups: list
  decisionRecords: list
  requirementImplementations: list
collectionSchemas:
  internalComponents: internalComponent
  deploymentConfigurations: deploymentConfiguration
  configurations: configuration
  decisionRecords: decisionRecordRef
  requirementImplementations: requirementImplementation
dictSubSchemas:
  vendorGovernance: vendorGovernance
internalComponent:
  requiredFields:
  - ref
  optionalFields:
  - role
  - configuration
  - notes
  fieldTypes:
    ref: str
    role: str
    configuration: str
    notes: str
  fieldDescriptions:
    ref: Reference the TechnologyComponent, Host, or deployable object included inside this service.
    role: Describe the component role inside this service.
    configuration: Reference a configuration id on the referenced TechnologyComponent when this service uses a specific named variant.
    notes: Add context that does not belong in role or configuration.
deploymentConfiguration:
  requiredFields:
  - id
  - name
  - description
  optionalFields:
  - addressesQualities
  - addsInternalComponents
  - addsExternalInteractions
  - addsArchitecturalDecisions
  - notes
  enumListFields:
    addressesQualities:
    - availability
    - scalability
    - recoverability
  fieldTypes:
    addressesQualities: list
    addsInternalComponents: list
    addsExternalInteractions: list
    addsArchitecturalDecisions: dict
configuration:
  requiredFields:
  - id
  - name
  - description
  - capabilities
  fieldTypes:
    capabilities: list
vendorGovernance:
  optionalFields:
  - dataLeavesInfrastructure
  - dataResidencyCommitment
  - dpaNotes
  - vendorSLA
  - incidentNotificationProcess
  fieldTypes:
    dataLeavesInfrastructure: bool
  fieldDescriptions:
    dataLeavesInfrastructure: Set true when data processed by this service leaves organization-controlled infrastructure.
    dataResidencyCommitment: Describe the vendor's data residency commitment (e.g., EU-only, US-only, configurable).
    dpaNotes: Record DPA (Data Processing Agreement) notes, reference, or status for this vendor service.
    vendorSLA: Document the vendor-committed SLA for this service (e.g., 99.9% uptime, 4-hour response).
    incidentNotificationProcess: Describe how the vendor notifies the organization of incidents or outages.
requirementImplementation:
  requiredFields:
  - requirementGroup
  - requirementId
  - status
  optionalFields:
  - mechanism
  - key
  - equals
  - criteria
  - ref
  - notes
  fieldDescriptions:
    requirementGroup: Reference the requirement_group object that owns this requirement.
    requirementId: Reference the requirement id within the requirement group.
    status: Use satisfied, not-applicable, or not-compliant to record the object disposition.
  enumFields:
    status:
    - satisfied
    - not-applicable
    - not-compliant
    mechanism:
    - technologyComponent
    - technologyComponentConfiguration
    - deploymentConfiguration
    - relationship
    - internalComponent
    - decisionRecord
    - field
  fieldTypes:
    criteria: dict
aiHint: An AI Gateway represents deployable AI/LLM traffic routing, prompt safety, filtering, token rate-limiting, and proxying behavior. Use vendorGovernance for data-residency and SLA fields when deliveryModel is saas, paas, or appliance.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally "1.0".
  uid: Use the generated opaque UID for object identity. Do not edit it for display-name, product-name, or taxonomy changes.
  type: Use ai_gateway exactly.
  name: Use a clear human-readable name for the AI Gateway service.
  deliveryModel: Use self-managed, paas, saas, or appliance to state who operates the underlying platform.
  host: For self-managed services, reference the Host this service runs on.
  primaryTechnologyComponent: For self-managed services, reference the main TechnologyComponent that provides the gateway behavior.
  internalComponents: List additional TechnologyComponents that run inside the service.
  catalogStatus: Use stub, incomplete, or complete to describe catalog maturity, not company adoption disposition.
  lifecycleStatus: Use candidate, preferred, existing-only, deprecated, or retired for this deployable service pattern.
  aliases: List prior or alternate human-readable names that should resolve to this object.
uidPattern: ^[0-9A-HJKMNP-TV-Z]{10}-[0-9A-HJKMNP-TV-Z]{4}$
