schemaVersion: '1.0'
type: data_store_service
requiredFields:
- schemaVersion
- uid
- type
- name
- deliveryModel
- catalogStatus
- lifecycleStatus
optionalFields:
- aliases
- description
- version
- ownerRole
- owner
- tags
- host
- primaryTechnologyComponent
- internalComponents
- externalInteractions
- deploymentConfigurations
- vendor
- productName
- productVersion
- capabilities
- configurations
- networkPlacement
- patchingOwner
- dataLeavesInfrastructure
- dataResidencyCommitment
- dpaNotes
- vendorSLA
- authenticationModel
- complianceCerts
- incidentNotificationProcess
- architecturalDecisions
- notes
- requirementGroups
- requirementImplementations
enumFields:
  ownerRole:
  - engineer
  - technology-admin
  - draft-admin
  catalogStatus:
  - stub
  - incomplete
  - complete
  lifecycleStatus:
  - candidate
  - preferred
  - existing-only
  - deprecated
  - retired
  deliveryModel:
  - self-managed
  - paas
  - saas
  - appliance
  networkPlacement:
  - public-facing
  - internal
  - vpc-private
  patchingOwner:
  - provider-managed
  - organization-scheduled
  - vendor-managed
  - aws-managed
  authenticationModel:
  - iam
  - api-key
  - oauth
  - saml
  - other
  - TBD
fieldTypes:
  aliases: list
  owner: dict
  tags: list
  internalComponents: list
  externalInteractions: list
  deploymentConfigurations: list
  capabilities: list
  configurations: list
  complianceCerts: list
  dataLeavesInfrastructure: bool
  architecturalDecisions: dict
  requirementGroups: list
  requirementImplementations: list
collectionSchemas:
  internalComponents: internalComponent
  externalInteractions: externalInteraction
  deploymentConfigurations: deploymentConfiguration
  configurations: configuration
  requirementImplementations: requirementImplementation
internalComponent:
  requiredFields:
  - ref
  optionalFields:
  - role
  - configuration
  - notes
  fieldTypes:
    ref: str
    role: str
    configuration: str
    notes: str
  fieldDescriptions:
    ref: Reference the Technology Component, Host, or deployable object included inside this service.
    role: Describe the component role inside this service.
    configuration: Reference a configuration id on the referenced Technology Component when this service uses a specific named variant.
    notes: Add context that does not belong in role or configuration.
externalInteraction:
  requiredFields:
  - capabilities
  optionalFields:
  - name
  - ref
  - notes
  - enabledBy
  fieldTypes:
    capabilities: list
deploymentConfiguration:
  requiredFields:
  - id
  - name
  - description
  optionalFields:
  - addressesQualities
  - addsInternalComponents
  - addsExternalInteractions
  - addsArchitecturalDecisions
  - notes
  enumListFields:
    addressesQualities:
    - availability
    - scalability
    - recoverability
  fieldTypes:
    addressesQualities: list
    addsInternalComponents: list
    addsExternalInteractions: list
    addsArchitecturalDecisions: dict
configuration:
  requiredFields:
  - id
  - name
  - description
  - capabilities
  fieldTypes:
    capabilities: list
requirementImplementation:
  requiredFields:
  - requirementGroup
  - requirementId
  - status
  optionalFields:
  - mechanism
  - key
  - equals
  - criteria
  - ref
  - notes
  fieldDescriptions:
    requirementGroup: Reference the requirement_group object that owns this requirement.
    requirementId: Reference the requirement id within the requirement group.
    status: Use satisfied, not-applicable, or not-compliant to record the object disposition.
  enumFields:
    status:
    - satisfied
    - not-applicable
    - not-compliant
    mechanism:
    - technologyComponent
    - technologyComponentConfiguration
    - deploymentConfiguration
    - externalInteraction
    - internalComponent
    - architecturalDecision
    - field
  fieldTypes:
    criteria: dict
aiHint: A DataStoreService defines deployable data persistence, file, or object storage behavior and the durability, recovery, and access-control facts needed to use it.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally "1.0".
  uid: Use the generated opaque UID for object identity. Do not edit it for display-name, product-name, or taxonomy changes.
  type: Use data_store_service exactly.
  name: Use a clear human-readable name for the DataStoreService capability.
  deliveryModel: Use self-managed, paas, saas, or appliance to state who operates the underlying platform.
  host: For self-managed DataStoreServices, reference the Host this service runs on.
  primaryTechnologyComponent: For self-managed DataStoreServices, reference the main Technology Component that provides persistence.
  internalComponents: List additional Technology Components that run inside the DataStoreService.
  catalogStatus: Use stub, incomplete, or complete to describe catalog maturity, not company adoption disposition.
  lifecycleStatus: Use candidate, preferred, existing-only, deprecated, or retired for this deployable service pattern.
  aliases: List prior or alternate human-readable names that should resolve to this object.
uidPattern: ^[0-9A-HJKMNP-TV-Z]{10}-[0-9A-HJKMNP-TV-Z]{4}$
