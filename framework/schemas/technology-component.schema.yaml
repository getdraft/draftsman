schemaVersion: '1.0'
type: technology_component
requiredFields:
- schemaVersion
- uid
- type
- name
- vendor
- productName
- productVersion
- classification
- catalogStatus
defaultOwnerRole: technology-admin
optionalFields:
- aliases
- description
- version
- owner
- tags
- subtype
- vendorLifecycle
- platformDependency
- capabilities
- configurations
- networkPlacement
- patchingOwner
- complianceCerts
- controlReferences
- notes
enumFields:
  catalogStatus:
  - stub
  - incomplete
  - complete
  classification:
  - operating-system
  - compute-platform
  - software
  - agent
fieldTypes:
  aliases: list
  owner: dict
  tags: list
  vendorLifecycle: dict
  capabilities: list
  configurations: list
  complianceCerts: list
  controlReferences: list
collectionSchemas:
  configurations: configuration
configuration:
  requiredFields:
  - id
  - name
  - description
  - capabilities
  optionalFields:
  - networkBindings
  fieldTypes:
    capabilities: list
    networkBindings: list
  collectionSchemas:
    networkBindings: networkBinding
  fieldDescriptions:
    networkBindings: List configuration-specific network ports, protocols, and traffic directions exposed or used by this TechnologyComponent configuration.
networkBinding:
  requiredFields:
  - port
  - protocol
  - direction
  optionalFields:
  - description
  enumFields:
    direction:
    - inbound
    - outbound
    - bidirectional
  fieldTypes:
    port: int
    protocol: str
    direction: str
    description: str
  fieldDescriptions:
    port: Record the integer network port used by this configuration.
    protocol: Record the protocol name, such as AMQP, HTTPS, gRPC, TCP, or a product-specific protocol.
    direction: Use inbound, outbound, or bidirectional to describe traffic direction for this binding.
    description: Explain the purpose or scope of this network binding.
aiHint: A TechnologyComponent is a discrete vendor product that an AI may recommend through capability implementations and use inside deployable objects.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally "1.0".
  type: Use the exact object type declared by the matching schema.
  name: Use a clear human-readable name for the object.
  vendor: Name the external vendor or provider for this technology or service.
  productName: Name the vendor product independently from the DRAFT object name.
  productVersion: Record the product version, release train, or managed/current marker.
  classification: Choose the one classification that describes the technology role.
  catalogStatus: Use stub, incomplete, or complete to describe catalog maturity, not company adoption disposition.
  uid: Use the generated opaque UID for object identity. Do not edit it for display-name, product-name, or taxonomy changes.
  aliases: List prior or alternate human-readable names that should resolve to this object.
  configurations: Use named configurations to describe capability-specific or deployment-specific variants of this TechnologyComponent.
uidPattern: ^[0-9A-HJKMNP-TV-Z]{10}-[0-9A-HJKMNP-TV-Z]{4}$
