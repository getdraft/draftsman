schemaVersion: '1.0'
type: drafting_session
defaultOwnerRole: engineering
requiredFields:
- schemaVersion
- uid
- type
- name
- catalogStatus
- lifecycleStatus
- sessionStatus
- primaryObjectType
- sourceArtifacts
- generatedObjects
- unresolvedQuestions
optionalFields:
- aliases
- description
- version
- owner
- tags
- primaryObjectUid
- assumptions
- nextSteps
- architectureNotes
- resumptionContext
enumFields:
  catalogStatus:
  - stub
  - incomplete
  - complete
  lifecycleStatus:
  - candidate
  - preferred
  - existing-only
  - deprecated
  - retired
  sessionStatus:
  - open
  - blocked
  - resolved
fieldTypes:
  aliases: list
  owner: dict
  tags: list
  sourceArtifacts: list
  generatedObjects: list
  unresolvedQuestions: list
  assumptions: list
  nextSteps: list
  architectureNotes: dict
  resumptionContext: dict
collectionSchemas:
  sourceArtifacts: sourceArtifact
  generatedObjects: generatedObject
  unresolvedQuestions: unresolvedQuestion
  assumptions: assumption
  nextSteps: nextStep
sourceArtifact:
  requiredFields:
  - name
  optionalFields:
  - type
  - location
  - notes
generatedObject:
  requiredFields:
  - name
  - type
  - status
  optionalFields:
  - ref
  - proposedUid
  - notes
  enumFields:
    status:
    - created
    - proposed
    - stubbed
    - deferred
objectRef:
  requiredFields:
  - ref
unresolvedQuestion:
  requiredFields:
  - id
  - question
  - status
  optionalFields:
  - reason
  - currentBestGuess
  - impact
  - relatedObjects
  enumFields:
    status:
    - open
    - answered
    - deferred
  fieldTypes:
    relatedObjects: list
  collectionSchemas:
    relatedObjects: objectRef
assumption:
  requiredFields:
  - id
  - statement
  optionalFields:
  - rationale
  - impact
  - relatedObjects
  fieldTypes:
    relatedObjects: list
  collectionSchemas:
    relatedObjects: objectRef
nextStep:
  requiredFields:
  - id
  - action
  - status
  optionalFields:
  - owner
  - notes
  - relatedObjects
  enumFields:
    status:
    - open
    - blocked
    - done
  fieldTypes:
    relatedObjects: list
  collectionSchemas:
    relatedObjects: objectRef
aiHint: A DraftingSession captures incomplete AI authoring work, assumptions, source material, generated objects, and unresolved questions.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally "1.0".
  type: Use the exact object type declared by the matching schema.
  name: Use a clear human-readable name for the object.
  catalogStatus: Use stub, incomplete, or complete to describe catalog maturity, not company adoption disposition.
  lifecycleStatus: Use candidate, preferred, existing-only, deprecated, or retired where this object still carries a lifecycle signal.
  sessionStatus: Provide a valid sessionStatus value for this drafting_session object.
  primaryObjectType: Provide a valid primaryObjectType value for this drafting_session object.
  sourceArtifacts: Provide a valid sourceArtifacts value for this drafting_session object.
  generatedObjects: Provide a valid generatedObjects value for this drafting_session object.
  unresolvedQuestions: Provide a valid unresolvedQuestions value for this drafting_session object.
  uid: Use the generated opaque UID for object identity. Do not edit it for display-name, product-name, or taxonomy changes.
  aliases: List prior or alternate human-readable names that should resolve to this object.
uidPattern: ^[0-9A-HJKMNP-TV-Z]{10}-[0-9A-HJKMNP-TV-Z]{4}$
