schemaVersion: '1.0'
type: host
requiredFields:
- schemaVersion
- uid
- type
- name
- catalogStatus
- lifecycleStatus
defaultOwnerRole: technology-admin
optionalFields:
- aliases
- description
- version
- owner
- tags
- architectureNotes
- operatingSystemComponent
- computePlatformComponent
- internalComponents
- deploymentConfigurations
- decisionRecords
- requirementImplementations
enumFields:
  catalogStatus:
  - stub
  - incomplete
  - complete
  lifecycleStatus:
  - candidate
  - preferred
  - existing-only
  - deprecated
  - retired
fieldTypes:
  aliases: list
  owner: dict
  tags: list
  architectureNotes: dict
  internalComponents: list
  deploymentConfigurations: list
  requirementGroups: list
  decisionRecords: list
  requirementImplementations: list
collectionSchemas:
  internalComponents: internalComponent
  deploymentConfigurations: deploymentConfiguration
  decisionRecords: decisionRecordRef
  requirementImplementations: requirementImplementation
internalComponent:
  requiredFields:
  - ref
  optionalFields:
  - role
  - configuration
  - notes
  fieldTypes:
    ref: str
    role: str
    configuration: str
    notes: str
  fieldDescriptions:
    ref: Reference the Technology Component, Host, or deployable object included inside this object.
    role: Describe the component role inside this object.
    configuration: Reference a configuration id on the referenced Technology Component when this component uses a specific named variant.
    notes: Add context that does not belong in role or configuration.
deploymentConfiguration:
  requiredFields:
  - id
  - name
  - description
  optionalFields:
  - addressesQualities
  - addsInternalComponents
  - addsExternalInteractions
  - addsArchitecturalDecisions
  - notes
  enumListFields:
    addressesQualities:
    - availability
    - scalability
    - recoverability
  fieldTypes:
    addressesQualities: list
    addsInternalComponents: list
    addsExternalInteractions: list
    addsArchitecturalDecisions: dict
requirementImplementation:
  requiredFields:
  - requirementGroup
  - requirementId
  - status
  optionalFields:
  - mechanism
  - key
  - equals
  - criteria
  - ref
  - notes
  fieldDescriptions:
    requirementGroup: Reference the requirement_group object that owns this requirement.
    requirementId: Reference the requirement id within the requirement group.
    status: Use satisfied, not-applicable, or not-compliant to record the object disposition.
  enumFields:
    status:
    - satisfied
    - not-applicable
    - not-compliant
    mechanism:
    - technologyComponent
    - technologyComponentConfiguration
    - deploymentConfiguration
    - relationship
    - internalComponent
    - architectureNote
    - field
  fieldTypes:
    criteria: dict
aiHint: A Host defines a deployable operational platform built from an operating system, compute platform, and required operational capabilities.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally "1.0".
  type: Use host exactly.
  name: Use a clear human-readable name for the object.
  catalogStatus: Use stub, incomplete, or complete to describe catalog maturity, not company adoption disposition.
  lifecycleStatus: Use candidate, preferred, existing-only, deprecated, or retired for this deployable host pattern.
  uid: Use the generated opaque UID for object identity. Do not edit it for display-name, product-name, or taxonomy changes.
  aliases: List prior or alternate human-readable names that should resolve to this object.
uidPattern: ^[0-9A-HJKMNP-TV-Z]{10}-[0-9A-HJKMNP-TV-Z]{4}$
