schemaVersion: '1.0'
type: reference_architecture
defaultOwnerRole: draft-admins
requiredFields:
- schemaVersion
- uid
- type
- name
- catalogStatus
- lifecycleStatus
optionalFields:
- aliases
- description
- version
- owner
- tags
- patternType
- architectureNotes
- applicableDefinitionChecklist
- scalingUnits
- serviceGroups
- requirementGroups
- requirementImplementations
- constraints
enumFields:
  catalogStatus:
  - stub
  - incomplete
  - complete
  lifecycleStatus:
  - candidate
  - preferred
  - existing-only
  - deprecated
  - retired
fieldTypes:
  aliases: list
  owner: dict
  tags: list
  architectureNotes: dict
  scalingUnits: list
  serviceGroups: list
  requirementGroups: list
  requirementImplementations: list
  constraints: list
collectionSchemas:
  scalingUnits: scalingUnit
  serviceGroups: serviceGroup
  requirementImplementations: requirementImplementation
  constraints: raConstraint
scalingUnit:
  requiredFields:
  - name
  - type
  optionalFields:
  - instanceCount
  - notes
  enumFields:
    type:
    - replicable
    - shared
serviceGroup:
  requiredFields:
  - name
  optionalFields:
  - deploymentTarget
  - scalingUnit
  - deployableObjects
  fieldTypes:
    deployableObjects: list
  collectionSchemas:
    deployableObjects: deployableObjectEntry
deployableObjectEntry:
  requiredFields: []
  optionalFields:
  - ref
  - objectType
  - capability
  - diagramTier
  - intent
  - instance
  - riskRef
  - notes
  enumFields:
    objectType:
    - host
    - runtime_service
    - data_store_service
    - network_service
    - product_component
    - data_component
    diagramTier:
    - presentation
    - application
    - data
    - utility
  intent:
    - ha
    - sa
  fieldDescriptions:
    ref: Reference a specific catalog object UID when this entry represents a known
      deployable object. Used in company SDPs and RAs that reference catalog-specific
      objects.
    objectType: Declare the expected catalog object type when no specific ref is provided.
      Use in framework-level or community RAs where the company catalog defines which
      specific objects satisfy the role. Provide ref or objectType; both may be present.
    capability: Reference the capability UID this slot requires. Use with objectType
      when a framework or community RA needs a portable role such as API Gateway,
      Serverless Function Runtime, Data Persistence, Messaging, or Observability
      without pinning the pattern to a company-specific catalog object.
requirementImplementation:
  requiredFields:
  - requirementGroup
  - requirementId
  - status
  optionalFields:
  - mechanism
  - key
  - equals
  - criteria
  - ref
  - notes
  fieldDescriptions:
    requirementGroup: Reference the requirement_group object that owns this requirement.
    requirementId: Reference the requirement id within the requirement group.
    status: Use satisfied, not-applicable, or not-compliant to record the object disposition.
  enumFields:
    status:
    - satisfied
    - not-applicable
    - not-compliant
    mechanism:
    - technologyComponent
    - technologyComponentConfiguration
    - deploymentConfiguration
    - relationship
    - internalComponent
    - architectureNote
    - field
  fieldTypes:
    criteria: dict
raConstraint:
  requiredFields:
  - id
  - require
  optionalFields:
  - description
  - rationale
  - when
  - notes
  fieldDescriptions:
    id: Stable kebab-case identifier for this constraint. Used in validator failure messages and exception references.
    description: Human-readable description of what this constraint enforces.
    rationale: Explanation of why this constraint exists and the risk it mitigates.
    when: Optional condition that must be true for this constraint to fire. If absent the constraint fires unconditionally.
    require: List of object characteristics that must be present in the SDP when the constraint fires.
    notes: Additional guidance for authors satisfying or documenting exceptions to this constraint.
aiHint: A ReferenceArchitecture defines a reusable deployment pattern that SoftwareDeploymentPatterns can follow.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally "1.0".
  type: Use the exact object type declared by the matching schema.
  name: Use a clear human-readable name for the object.
  catalogStatus: Use stub, incomplete, or complete to describe catalog maturity, not company adoption disposition.
  lifecycleStatus: Use candidate, preferred, existing-only, deprecated, or retired where this object still carries a lifecycle signal.
  uid: Use the generated opaque UID for object identity. Do not edit it for display-name, product-name, or taxonomy changes.
  aliases: List prior or alternate human-readable names that should resolve to this object.
uidPattern: ^[0-9A-HJKMNP-TV-Z]{10}-[0-9A-HJKMNP-TV-Z]{4}$
