schemaVersion: '1.0'
type: network_service
requiredFields:
- schemaVersion
- uid
- type
- name
- deliveryModel
- catalogStatus
- lifecycleStatus
defaultOwnerRole: technology-admin
optionalFields:
- aliases
- description
- version
- owner
- tags
- host
- primaryTechnologyComponent
- internalComponents
- deploymentConfigurations
- vendor
- productName
- productVersion
- capabilities
- configurations
- networkFunction
- networkTopology
- protocols
- patchingOwner
- vendorGovernance
- architectureNotes
- notes
- decisionRecords
- requirementImplementations
conditionalRequired:
- when:
    deliveryModel:
    - saas
    - paas
    - appliance
  require:
  - vendor
  - productName
  - productVersion
enumFields:
  catalogStatus:
  - stub
  - incomplete
  - complete
  lifecycleStatus:
  - candidate
  - preferred
  - existing-only
  - deprecated
  - retired
  deliveryModel:
  - self-managed
  - paas
  - saas
  - appliance
fieldTypes:
  aliases: list
  owner: dict
  tags: list
  capabilities: list
  internalComponents: list
  deploymentConfigurations: list
  requirementGroups: list
  decisionRecords: list
  requirementImplementations: list
  vendorGovernance: dict
  protocols: list
  architectureNotes: dict
collectionSchemas:
  internalComponents: internalComponent
  deploymentConfigurations: deploymentConfiguration
  decisionRecords: decisionRecordRef
  requirementImplementations: requirementImplementation
requirementImplementation:
  requiredFields:
  - requirementGroup
  - requirementId
  - status
  optionalFields:
  - mechanism
  - key
  - equals
  - criteria
  - ref
  - notes
  fieldDescriptions:
    requirementGroup: Reference the requirement_group object that owns this requirement.
    requirementId: Reference the requirement id within the requirement group.
    status: Use satisfied, not-applicable, or not-compliant to record the object disposition.
  enumFields:
    status:
    - satisfied
    - not-applicable
    - not-compliant
    mechanism:
    - technologyComponent
    - technologyComponentConfiguration
    - deploymentConfiguration
    - relationship
    - internalComponent
    - architectureNote
    - field
  fieldTypes:
    criteria: dict
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally "1.0".
  uid: Use the generated opaque UID for object identity. Do not edit it for display-name changes.
  type: Use network_service exactly.
  name: Use a clear human-readable name for the network infrastructure service.
  deliveryModel: Use self-managed, paas, saas, or appliance to state how this network service is operated.
  networkFunction: Describe what this device does — routing, switching, segmentation, WAN optimization, DNS, etc.
  networkTopology: Describe what network segments, zones, or routing domains this device defines or creates.
  protocols: List the network protocols this device participates in — BGP, OSPF, VLAN, MPLS, etc.
  host: For self-managed services, reference the Host this service runs on.
  primaryTechnologyComponent: Reference the main TechnologyComponent that provides the network service function.
  catalogStatus: Use stub, incomplete, or complete to describe catalog maturity, not company adoption disposition.
  lifecycleStatus: Use candidate, preferred, existing-only, deprecated, or retired for this network service.
  aliases: List prior or alternate human-readable names that should resolve to this object.
aiHint: >
  A NetworkService represents non-perimeter network fabric infrastructure — switches, routers, SDN
  controllers, WAN appliances — that creates or manages the network topology other objects depend on.
  Use networkFunction to describe what this device does, networkTopology to describe what segments or
  zones it defines, and protocols to list the network protocols it participates in. Use deliveryModel
  appliance for physical or virtual network appliances; use paas for cloud-managed networking services.
  Do not use NetworkService for perimeter boundary devices (WAF, API gateway, firewall at the
  application boundary) — those use EdgeGatewayService. See issue #36 for the boundary definition.
uidPattern: ^[0-9A-HJKMNP-TV-Z]{10}-[0-9A-HJKMNP-TV-Z]{4}$
