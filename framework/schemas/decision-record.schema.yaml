schemaVersion: '1.0'
type: decision_record
defaultOwnerRole: shared-services
requiredFields:
- schemaVersion
- uid
- type
- name
- category
- status
- catalogStatus
- lifecycleStatus
optionalFields:
- aliases
- description
- version
- owner
- tags
- affectedComponent
- impact
- mitigationPath
- decisionRationale
- relatedDecisionRecords
- controlReferences
- linkedObject
- approver
- approvalDate
enumFields:
  catalogStatus:
  - stub
  - incomplete
  - complete
  lifecycleStatus:
  - candidate
  - preferred
  - existing-only
  - deprecated
  - retired
  category:
  - risk
  - decision
  status:
  - open
  - accepted
  - mitigated
  - resolved
fieldTypes:
  aliases: list
  owner: dict
  tags: list
  relatedDecisionRecords: list
  controlReferences: list
  approver: str
  approvalDate: str
conditionalRequired:
- when:
    category: decision
  require:
  - decisionRationale
aiHint: A DecisionRecord captures an architecture decision, risk, mitigation, or status that an AI should preserve as a first-class object.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally "1.0".
  type: Use the exact object type declared by the matching schema.
  name: Use a clear human-readable name for the object.
  category: Provide a valid category value for this decision_record object.
  status: Provide a valid status value for this decision_record object.
  catalogStatus: Use stub, incomplete, or complete to describe catalog maturity, not company adoption disposition.
  lifecycleStatus: Use candidate, preferred, existing-only, deprecated, or retired where this object still carries a lifecycle signal.
  uid: Use the generated opaque UID for object identity. Do not edit it for display-name, product-name, or taxonomy changes.
  aliases: List prior or alternate human-readable names that should resolve to this object.
  linkedObject: UID of the catalog object (any type) most directly affected by or related to this decision or risk.
uidPattern: ^[0-9A-HJKMNP-TV-Z]{10}-[0-9A-HJKMNP-TV-Z]{4}$
