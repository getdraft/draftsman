schemaVersion: '1.0'
uid: 01KS8N4KR3-MTSA
type: reference_architecture
name: Multi-Tenant SaaS
description: Deployment pattern for software-as-a-service products that serve multiple
  customer tenants from shared infrastructure. Defines tenant, platform, data, and
  management zones with explicit isolation requirements.
patternType: multi-tenant
catalogStatus: approved
lifecycleStatus: preferred
owner:
  team: cloud-architecture
  contact: cloud-architecture@example.com
tags:
- reference-architecture
- multi-tenant
- saas
applicableDefinitionChecklist:
- Tenant isolation strategy must be documented in architecturalDecisions — separate
  database per tenant, shared database with separate schema, or shared schema with
  row-level security.
- Platform tier services must not store tenant-identifiable data without an explicit
  isolation rationale in architecturalDecisions.
- Management plane must be in a separate network zone from tenant-facing services.
- The data tier must document which tenants share which stores and what isolation
  mechanism applies.
- The SDP must document the tenant provisioning and de-provisioning path.
serviceGroups:
- name: Tenant Runtime
  deployableObjects:
  - objectType: edge_gateway_service
    diagramTier: presentation
    notes: Per-tenant or shared API gateway providing tenant routing, authentication
      enforcement, and per-tenant rate limiting.
  - objectType: runtime_service
    diagramTier: application
    notes: Tenant-scoped runtime service. May be shared across tenants with row-level
      isolation or deployed per-tenant depending on the chosen isolation model.
- name: Platform Services
  deployableObjects:
  - objectType: runtime_service
    diagramTier: application
    notes: Shared platform service consumed by all tenants — for example identity,
      billing, notifications, or audit log. Must not store tenant data without a
      documented isolation mechanism.
- name: Data Tier
  deployableObjects:
  - objectType: data_store_service
    diagramTier: data
    notes: Tenant data store. The isolation model must be documented in the SDP's
      architecturalDecisions. DataComponents are deployed onto this service.
- name: Management Plane
  deployableObjects:
  - objectType: runtime_service
    diagramTier: utility
    notes: Control-plane services including tenant provisioning, observability aggregation,
      and administrative tooling. Must be isolated from tenant-facing network paths.
architecturalDecisions:
  patternRationale: Multi-tenant SaaS deployments require explicit isolation guarantees
    at the data, runtime, and network layers. The pattern separates tenant-facing runtime
    from shared platform services to prevent cross-tenant data leakage and allow platform
    services to evolve independently of tenant workloads.
  tenantIsolationModels: 'Three isolation models are supported: (1) separate database
    per tenant — highest isolation, highest operational cost; (2) shared database with
    separate schema per tenant — moderate isolation, moderate cost; (3) shared schema
    with row-level security — lowest isolation, lowest cost. The chosen model must
    be documented in the SDP''s architecturalDecisions.'
  managementPlaneIsolation: The management plane must not share network paths with
    tenant-facing services. Administrative access to tenant data must flow through
    the management plane, not through tenant runtime endpoints.
requirementGroups: []
requirementImplementations: []
