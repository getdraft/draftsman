schemaVersion: '1.0'
uid: 01KSWVZSZ5-B146
type: requirement_group
name: NetworkService RequirementGroup
description: >
  Base requirements for NetworkService objects covering network function declaration,
  topology definition, and protocol governance. Delivery model requirement groups
  (Appliance Delivery, SaaS Delivery, Service Behavior) apply on top of these base
  requirements based on how the network service is operated.
version: 1.0.0
catalogStatus: complete
authority:
  name: DRAFT Framework
  shortName: DRAFT
  source: DRAFT Framework
activation: always
appliesTo:
- network_service
requirements:
- id: network-function
  description: The network service must declare what network function it performs.
  rationale: >
    The network function is the architectural reason this device exists. Without it,
    the catalog cannot explain what role the device plays in the network architecture.
    The framework-native network capabilities (Network Connectivity, Network Segmentation,
    Traffic Management, WAN Connectivity) name the standard network functions a service
    can perform; referencing the TechnologyComponent that provides one of them grounds the
    declared function in an approved capability.
  canBeSatisfiedBy:
  - mechanism: field
    key: networkFunction
    example: 'networkFunction: Layer 3 routing between production and management segments'
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KSWVZSZ5-Q6HW
    example: A routing or switching TechnologyComponent providing Network Connectivity across the fabric.
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KSWVZSZ5-1RTH
    example: A firewall or SDN TechnologyComponent providing Network Segmentation between zones.
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KSWVZSZ5-M0FR
    example: A load balancer or traffic-shaping TechnologyComponent providing Traffic Management.
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KSWVZSZ5-26F1
    example: A WAN edge or interconnect TechnologyComponent providing WAN Connectivity between sites.
  - mechanism: decisionRecord
    key: networkFunction
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: networkFunction, recording this decision (or why it is not applicable).'
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - field
  - technologyComponentConfiguration
  - decisionRecord
- id: network-topology-definition
  description: The network service must declare what network segments, zones, or routing domains it defines or manages.
  rationale: >
    Network infrastructure objects that create topology are upstream of SDP network zone
    declarations. Documenting what zones or segments a device creates grounds the zone
    vocabulary that SDPs reference.
  canBeSatisfiedBy:
  - mechanism: field
    key: networkTopology
    example: 'networkTopology: Defines production VLAN (10), management VLAN (20), and storage VLAN (30)'
  - mechanism: decisionRecord
    key: networkTopology
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: networkTopology, recording this decision (or why it is not applicable).'
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: true
  naRationale: Acceptable when the network service does not create or define topology — for example a pure WAN transport device.
  validAnswerTypes:
  - field
  - decisionRecord
- id: protocol-governance
  description: The network service must declare which network protocols it participates in.
  rationale: >
    Protocol participation is an architectural decision with security and interoperability
    implications. Undocumented protocol use creates compliance and troubleshooting gaps.
  canBeSatisfiedBy:
  - mechanism: field
    key: protocols
    example: 'protocols: [BGP, OSPF, VLAN]'
  - mechanism: decisionRecord
    key: protocols
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: protocols, recording this decision (or why it is not applicable).'
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - field
  - decisionRecord
lifecycleStatus: preferred
tags:
- network
- requirement-group
- definition
