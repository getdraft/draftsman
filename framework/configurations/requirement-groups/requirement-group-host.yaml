schemaVersion: '1.0'
uid: 01KQQ4Q027-THYN
type: requirement_group
name: Host Requirement Group
description: Structured checklist of required questions and answers used to define a complete and correct Host.
version: 3.0.0
catalogStatus: complete
authority:
  name: DRAFT Framework
  shortName: DRAFT
  source: DRAFT Framework
activation: always
appliesTo:
- host
requirements:
- id: operating-system
  description: The host must declare the Operating System Technology Component that defines the operating system baseline.
  rationale: A host is not complete until the operating system product baseline is explicit.
  canBeSatisfiedBy:
  - mechanism: field
    key: operatingSystemComponent
    example: 'operatingSystemComponent: technology.os.microsoft-windowsserver-2022'
  minimumSatisfactions: 1
  relatedCapability: 01KQQ4Q026-QM2X
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - field
- id: compute-platform
  description: The host must declare the Compute Platform Technology Component that defines the physical or virtual compute substrate.
  rationale: A host is not complete until the compute substrate is explicit.
  canBeSatisfiedBy:
  - mechanism: field
    key: computePlatformComponent
    example: 'computePlatformComponent: technology.compute.amazon-ec2-standard'
  minimumSatisfactions: 1
  relatedCapability: 01KQQ4Q026-1HZP
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - field
- id: authentication
  description: The host must address how administrators and services authenticate to the platform.
  rationale: Identity control is a baseline host requirement because unmanaged access breaks supportability and auditability.
  canBeSatisfiedBy:
  - mechanism: externalInteraction
    criteria:
      capability: 01KQQ4Q026-MHJM
    example: Active Directory or another enterprise identity platform.
  - mechanism: internalComponent
    criteria:
      capability: 01KQQ4Q026-MHJM
    example: A Technology Component installed locally that provides host authentication behavior.
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KQQ4Q026-MHJM
    example: An Operating System Technology Component configuration that defines the authentication model.
  - mechanism: architectureNote
    key: authenticationApproach
    example: A documented local or federated authentication model when the dependency is not expressed as a platform interaction.
  minimumSatisfactions: 1
  relatedCapability: 01KQQ4Q026-MHJM
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architectureNote
  - externalInteraction
  - internalComponent
  - technologyComponentConfiguration
- id: log-management
  description: The host must address how logs leave the host and reach an operationally supported logging destination.
  rationale: Logging is required for troubleshooting, security response, and evidentiary review.
  canBeSatisfiedBy:
  - mechanism: externalInteraction
    criteria:
      capability: 01KQQ4Q026-D04B
    example: A relationship object where source is this host and the relationship has the log-management capability, pointing to a modeled central logging Runtime Service, Edge/Gateway Service, or PaaS-delivered service.
  - mechanism: internalComponent
    criteria:
      capability: 01KQQ4Q026-D04B
    example: A locally installed Technology Component that implements host log management.
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KQQ4Q026-D04B
    example: An Operating System Technology Component configuration that redirects logs to a dedicated volume or forwarding path.
  - mechanism: architectureNote
    key: loggingApproach
    example: A documented log shipping design for cases where the platform is described indirectly.
  minimumSatisfactions: 1
  relatedCapability: 01KQQ4Q026-D04B
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architectureNote
  - externalInteraction
  - internalComponent
  - technologyComponentConfiguration
- id: health-welfare-monitoring
  description: The host must address health and welfare monitoring for performance, availability, and operational telemetry.
  rationale: Hosts must show how operators know whether the platform is healthy and supportable.
  canBeSatisfiedBy:
  - mechanism: externalInteraction
    criteria:
      capability: 01KQQ4Q026-98VD
    example: Dynatrace, Nagios, or another host monitoring platform.
  - mechanism: internalComponent
    criteria:
      capability: 01KQQ4Q026-98VD
    example: A locally installed Technology Component that exports host health telemetry.
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KQQ4Q026-98VD
    example: A Technology Component configuration that enables local health telemetry or metrics export.
  - mechanism: architectureNote
    key: healthWelfareMonitoringApproach
    example: A documented explanation of the host monitoring pattern when the implementation is not captured directly.
  minimumSatisfactions: 1
  relatedCapability: 01KQQ4Q026-98VD
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architectureNote
  - externalInteraction
  - internalComponent
  - technologyComponentConfiguration
- id: security-monitoring
  description: The host must address endpoint security or runtime security monitoring.
  rationale: Hosts must show how they are protected and observed by a security control plane.
  canBeSatisfiedBy:
  - mechanism: externalInteraction
    criteria:
      capability: 01KQQ4Q026-JW52
    example: CrowdStrike Falcon Platform or Wiz Cloud Security.
  - mechanism: internalComponent
    criteria:
      capability: 01KQQ4Q026-JW52
    example: An installed Technology Component that provides endpoint or runtime security monitoring.
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KQQ4Q026-JW52
    example: A Technology Component configuration that enables local security telemetry or runtime protection behavior.
  - mechanism: architectureNote
    key: securityMonitoringApproach
    example: A documented statement of the host security monitoring pattern.
  minimumSatisfactions: 1
  relatedCapability: 01KQQ4Q026-JW52
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architectureNote
  - externalInteraction
  - internalComponent
  - technologyComponentConfiguration
- id: patch-management
  description: The host must address how patching is orchestrated and what operational mechanism applies updates.
  rationale: Patching is a governance control, not an implementation detail that can be left implicit.
  canBeSatisfiedBy:
  - mechanism: externalInteraction
    criteria:
      capability: 01KQQ4Q026-BH6E
    example: Automox Patch Management.
  - mechanism: internalComponent
    criteria:
      capability: 01KQQ4Q026-BH6E
    example: An installed Technology Component that performs or coordinates patch execution.
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KQQ4Q026-BH6E
    example: A Technology Component configuration that defines how the platform is patched without a separate external orchestrator.
  - mechanism: architectureNote
    key: patchManagementApproach
    example: A documented patch orchestration model when a platform interaction is not explicitly modeled.
  minimumSatisfactions: 1
  relatedCapability: 01KQQ4Q026-BH6E
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architectureNote
  - externalInteraction
  - internalComponent
  - technologyComponentConfiguration
lifecycleStatus: existing-only
tags:
- host
- requirement-group
- definition
appliesToQualifiers:
  category: host
