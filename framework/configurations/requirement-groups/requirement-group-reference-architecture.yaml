schemaVersion: '1.0'
uid: 01KQQ4Q027-SS2K
type: requirement_group
name: Reference Architecture Requirement Group
description: Structured checklist of required questions and answers used to define a complete and correct Reference Architecture.
version: 1.0.0
catalogStatus: complete
owner:
  team: cloud-architecture
  contact: cloud-architecture@example.com
authority:
  name: DRAFT Framework
  shortName: DRAFT
  source: DRAFT Framework
activation: always
appliesTo:
- reference_architecture
requirements:
- id: pattern-type
  description: What supported deployment pattern does this Reference Architecture define for application teams?
  rationale: The Reference Architecture must clearly signal when an application should adopt this deployment pattern to achieve the intended non-functional outcomes.
  canBeSatisfiedBy:
  - mechanism: field
    key: patternType
    example: multi-tier
  - mechanism: architectureNote
    key: patternType
    example: multi-tier
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - field
  - architectureNote
- id: service-groups
  description: How are the required services clustered into service groups and diagram tiers to realize this deployment pattern?
  rationale: The Reference Architecture should guide downstream Software Deployment Patterns and application teams with the same service-group and tier structure they will use in a real deployment.
  canBeSatisfiedBy:
  - mechanism: field
    key: serviceGroups
    example: Non-empty serviceGroups list with named tiers and deployable object references
  - mechanism: internalComponent
    criteria:
      role: service-group
    example: Frontend UI service group with presentation-tier deployable objects and Data Services service group with data-tier deployable objects
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - field
  - internalComponent
- id: deployment-qualities
  description: What non-functional deployment qualities is this Reference Architecture intended to deliver, and what pattern-level decisions make that possible?
  rationale: A Reference Architecture exists to guide application teams toward supported deployment choices that meet availability, recoverability, security, and similar non-functional requirements.
  canBeSatisfiedBy:
  - mechanism: field
    key: architectureNotes
    example: all tiers HA, autoscaling on web tier, AlwaysOn on data tier
  - mechanism: architectureNote
    key: architectureNotes
    example: all tiers HA, autoscaling on web tier, AlwaysOn on data tier
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - field
  - architectureNote
lifecycleStatus: preferred
tags:
- reference-architecture
- requirement-group
- definition
