schemaVersion: '1.0'
uid: 01KQQ4Q027-VBF0
type: requirement_group
name: DataStoreService Requirement Group
description: Additional DataStoreService checklist items extending the service behavior Requirement Group for durable data, recovery, and access control.
version: 3.0.0
catalogStatus: approved
owner:
  team: cloud-architecture
  contact: cloud-architecture@example.com
authority:
  name: DRAFT Framework
  shortName: DRAFT
  source: DRAFT Framework
activation: always
appliesTo:
- data_store_service
appliesToQualifiers:
  deliveryModel: self-managed
requirements:
- id: backup-strategy
  description: The Data-at-Rest service must document its backup strategy.
  rationale: A data-at-rest platform is not governable unless its backup model is explicit.
  canBeSatisfiedBy:
  - mechanism: architecturalDecision
    key: backup.strategy
    example: Daily full plus hourly log backup or daily full backup.
  minimumSatisfactions: 1
  relatedCapability: 01KQQ4Q026-7T2H
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architecturalDecision
- id: backup-platform
  description: The Data-at-Rest service must document the backup platform, vault, or managed service responsible for storing or managing backups.
  rationale: Backup strategy says what recovery posture is expected; the backup platform makes the operational dependency explicit.
  canBeSatisfiedBy:
  - mechanism: externalInteraction
    criteria:
      capability: 01KQQ4Q026-7T2H
    example: An enterprise backup vault, backup service, object store, or managed provider backup capability.
  - mechanism: architecturalDecision
    key: backup.platform
    example: Provider-managed backups retained inside the managed database service.
  minimumSatisfactions: 1
  relatedCapability: 01KQQ4Q026-7T2H
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architecturalDecision
  - externalInteraction
- id: recovery-time-objective
  description: The Data-at-Rest service must document its recovery time objective.
  rationale: Recovery time must be explicit so operators and product teams understand the recovery expectation.
  canBeSatisfiedBy:
  - mechanism: architecturalDecision
    key: backup.rto
    example: A one-hour or four-hour recovery time objective.
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architecturalDecision
- id: recovery-point-objective
  description: The Data-at-Rest service must document its recovery point objective.
  rationale: Recovery point must be explicit so durability expectations are clear.
  canBeSatisfiedBy:
  - mechanism: architecturalDecision
    key: backup.rpo
    example: A one-hour or twenty-four-hour recovery point objective.
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architecturalDecision
- id: ha-replication-mechanism
  description: The Data-at-Rest service must document its high-availability or replication mechanism.
  rationale: Database resilience depends on an explicit clustering, replication, or standalone posture.
  canBeSatisfiedBy:
  - mechanism: architecturalDecision
    key: ha.mechanism
    example: AlwaysOn Availability Groups or none for a standard-availability deployment.
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architecturalDecision
- id: encryption-at-rest
  description: The Data-at-Rest service must document how data is encrypted at rest.
  rationale: Storage protection is a core control for regulated and business-critical data.
  canBeSatisfiedBy:
  - mechanism: architecturalDecision
    key: encryption.atRest
    example: Transparent Data Encryption enabled for all production data stores.
  minimumSatisfactions: 1
  relatedCapability: 01KQQ4Q026-H3B5
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architecturalDecision
- id: access-control-model
  description: The Data-at-Rest service must document its administrative and application access control model.
  rationale: Database access boundaries must be understandable to engineering, security, and operations teams.
  canBeSatisfiedBy:
  - mechanism: externalInteraction
    criteria:
      capability: 01KQQ4Q026-MHJM
    example: Active Directory integration for data service administrators and service identities.
  - mechanism: architecturalDecision
    key: accessControl.model
    example: Active Directory integrated access with role-based SQL permissions.
  minimumSatisfactions: 1
  relatedCapability: 01KQQ4Q026-4JR6
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architecturalDecision
  - externalInteraction
lifecycleStatus: existing-only
tags:
- service
- dbms
- requirement-group
- definition
inherits: 01KQQ4Q027-K5DR
