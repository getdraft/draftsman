type: requirement_group
name: DataStoreService RequirementGroup
description: Additional DataStoreService checklist items extending the service behavior RequirementGroup for durable data, recovery, and access control.
version: 3.0.0
catalogStatus: complete
authority:
  name: DRAFT Framework
  shortName: DRAFT
  source: DRAFT Framework
activation: always
appliesTo:
- data_store_service
appliesToQualifiers:
  deliveryModel: self-managed
requirements:
- id: backup-strategy
  description: The Data Store service must document its backup strategy.
  rationale: A data store platform is not governable unless its backup model is explicit.
  canBeSatisfiedBy:
  - mechanism: decisionRecord
    key: backup.strategy
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: backup.strategy, recording this decision (or why it is not applicable).'
  minimumSatisfactions: 1
  relatedCapability: 01KQQ4Q026-7T2H
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - decisionRecord
- id: backup-platform
  description: The Data Store service must document the backup platform, vault, or managed service responsible for storing or managing backups.
  rationale: Backup strategy says what recovery posture is expected; the backup platform makes the operational dependency explicit.
  canBeSatisfiedBy:
  - mechanism: relationship
    criteria:
      capability: 01KQQ4Q026-7T2H
    example: An enterprise backup vault, backup service, object store, or managed provider backup capability.
  - mechanism: decisionRecord
    key: backup.platform
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: backup.platform, recording this decision (or why it is not applicable).'
  minimumSatisfactions: 1
  relatedCapability: 01KQQ4Q026-7T2H
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - decisionRecord
  - relationship
- id: recovery-time-objective
  description: The Data Store service must document its recovery time objective.
  rationale: Recovery time must be explicit so operators and product teams understand the recovery expectation.
  canBeSatisfiedBy:
  - mechanism: decisionRecord
    key: backup.rto
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: backup.rto, recording this decision (or why it is not applicable).'
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - decisionRecord
- id: recovery-point-objective
  description: The Data Store service must document its recovery point objective.
  rationale: Recovery point must be explicit so durability expectations are clear.
  canBeSatisfiedBy:
  - mechanism: decisionRecord
    key: backup.rpo
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: backup.rpo, recording this decision (or why it is not applicable).'
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - decisionRecord
- id: ha-replication-mechanism
  description: The Data Store service must document its high-availability or replication mechanism.
  rationale: Database resilience depends on an explicit clustering, replication, or standalone posture.
  canBeSatisfiedBy:
  - mechanism: decisionRecord
    key: ha.mechanism
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: ha.mechanism, recording this decision (or why it is not applicable).'
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - decisionRecord
- id: encryption-at-rest
  description: The Data Store service must document how data is encrypted at rest.
  rationale: Storage protection is a core control for regulated and business-critical data.
  canBeSatisfiedBy:
  - mechanism: decisionRecord
    key: encryption.atRest
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: encryption.atRest, recording this decision (or why it is not applicable).'
  minimumSatisfactions: 1
  relatedCapability: 01KQQ4Q026-H3B5
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - decisionRecord
- id: access-control-model
  description: The Data Store service must document its administrative and application access control model.
  rationale: Database access boundaries must be understandable to engineering, security, and operations teams.
  canBeSatisfiedBy:
  - mechanism: relationship
    criteria:
      capability: 01KQQ4Q026-MHJM
    example: Active Directory integration for data service administrators and service identities.
  - mechanism: decisionRecord
    key: accessControl.model
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: accessControl.model, recording this decision (or why it is not applicable).'
  minimumSatisfactions: 1
  relatedCapability: 01KQQ4Q026-4JR6
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - decisionRecord
  - relationship
