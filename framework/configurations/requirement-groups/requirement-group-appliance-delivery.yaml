schemaVersion: '1.0'
uid: 01KQQ4Q027-DSDD
type: requirement_group
name: Appliance Delivery RequirementGroup
description: Structured requirements used when a Runtime, Data Store, or NetworkService uses appliance delivery and the underlying host is blackbox to the adopter.
version: 1.1.0
catalogStatus: complete
authority:
  name: DRAFT Framework
  shortName: DRAFT
  source: DRAFT Framework
activation: always
appliesTo:
- runtime_service
- data_store_service
- network_service
requirements:
- id: function
  description: What capabilities does this appliance provide?
  rationale: The capabilities are the reason the appliance exists in the architecture.
  canBeSatisfiedBy:
  - mechanism: field
    key: capabilities
    example: 'capabilities: [load-balancing]'
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - field
  minimumSatisfactions: 1
- id: authentication-access-model
  description: How is administrative, user, or service access to the appliance authenticated?
  rationale: A blackbox appliance still needs an explicit access-control answer because it provides a deployed capability without inheriting the host or service RequirementGroup baseline.
  canBeSatisfiedBy:
  - mechanism: relationship
    criteria:
      capability: 01KQQ4Q026-MHJM
    example: The appliance authenticates administrators through an enterprise identity platform.
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KQQ4Q026-MHJM
    example: A named appliance configuration defines the authentication model.
  - mechanism: decisionRecord
    key: authenticationAccessModel
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: authenticationAccessModel, recording this decision (or why it is not applicable).'
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - decisionRecord
  - relationship
  - technologyComponentConfiguration
  minimumSatisfactions: 1
- id: log-audit-visibility
  description: What operational logs, audit records, or events are visible to the adopter, and where do they go?
  rationale: A blackbox appliance must state the log or audit visibility the adopter can rely on because hidden host logs are not modeled.
  canBeSatisfiedBy:
  - mechanism: relationship
    criteria:
      capability: 01KQQ4Q026-D04B
    example: A relationship object where source is this appliance and the relationship has the log-management capability, pointing to a modeled central logging service or SIEM platform.
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KQQ4Q026-D04B
    example: A named appliance configuration enables audit export or log forwarding.
  - mechanism: decisionRecord
    key: logAuditVisibility
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: logAuditVisibility, recording this decision (or why it is not applicable).'
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - decisionRecord
  - relationship
  - technologyComponentConfiguration
  minimumSatisfactions: 1
- id: health-status-visibility
  description: How does the adopter observe appliance health, status, incidents, or operational telemetry?
  rationale: The appliance provides a service-like capability, so consumers need to know how health and status are observed even though the internal host is hidden.
  canBeSatisfiedBy:
  - mechanism: relationship
    criteria:
      capability: 01KQQ4Q026-98VD
    example: The appliance publishes health metrics to the enterprise monitoring platform.
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KQQ4Q026-98VD
    example: A named appliance configuration enables health checks, status endpoints, or metrics export.
  - mechanism: decisionRecord
    key: healthStatusVisibility
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: healthStatusVisibility, recording this decision (or why it is not applicable).'
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - decisionRecord
  - relationship
  - technologyComponentConfiguration
  minimumSatisfactions: 1
- id: patch-update-model
  description: Who or what is responsible for appliance firmware, software, and hidden host updates, and what mechanism applies them?
  rationale: The hidden host prevents normal host patch-management modeling, so the appliance must document the update responsibility and mechanism directly.
  canBeSatisfiedBy:
  - mechanism: field
    key: patchingOwner
    example: 'patchingOwner: vendor-managed'
  - mechanism: relationship
    criteria:
      capability: 01KQQ4Q026-BH6E
    example: Updates are orchestrated through a vendor or cloud-provider patch service.
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KQQ4Q026-BH6E
    example: A named appliance configuration defines update windows or managed update policy.
  - mechanism: decisionRecord
    key: patchUpdateModel
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: patchUpdateModel, recording this decision (or why it is not applicable).'
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - decisionRecord
  - relationship
  - field
  - technologyComponentConfiguration
  minimumSatisfactions: 1
- id: resilience-model
  description: "What is the resilience model of this appliance \u2014 is it inherently highly available, single instance, or clustered?\n"
  rationale: A blackbox appliance still needs an explicit answer for the resilience posture the adopter is depending on.
  canBeSatisfiedBy:
  - mechanism: decisionRecord
    key: resilienceModel
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: resilienceModel, recording this decision (or why it is not applicable).'
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - decisionRecord
  minimumSatisfactions: 1
- id: configurable-surface
  description: 'What configuration surface does the organization control on this appliance?

    '
  rationale: The object should capture what the adopter can actually configure rather than pretending the hidden host is visible.
  canBeSatisfiedBy:
  - mechanism: decisionRecord
    key: configurableSurface
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: configurableSurface, recording this decision (or why it is not applicable).'
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - decisionRecord
  minimumSatisfactions: 1
- id: failure-domain
  description: What failure domain does this appliance introduce?
  rationale: Blackbox shared components can create broad impact boundaries that must be explicit.
  canBeSatisfiedBy:
  - mechanism: decisionRecord
    key: failureDomain
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: failureDomain, recording this decision (or why it is not applicable).'
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - decisionRecord
  minimumSatisfactions: 1
- id: compliance-posture
  description: What compliance certifications does this appliance carry?
  rationale: Compliance posture must be explicit when the underlying implementation is opaque.
  canBeSatisfiedBy:
  - mechanism: field
    key: complianceCerts
    allowEmpty: true
    example: 'complianceCerts: [SOC2, ISO27001]'
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - field
  minimumSatisfactions: 1
lifecycleStatus: preferred
tags:
- appliance
- requirement-group
- definition
appliesToQualifiers:
  deliveryModel: appliance
