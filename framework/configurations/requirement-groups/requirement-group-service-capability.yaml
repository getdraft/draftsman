  description: A runtime service that declares the Analytics capability must document how operational and business data is processed and analyzed to produce insight.
  rationale: Analytics is a declared native capability. A service documents a declared capability either by resolving it to an approved TechnologyComponent or modeled interaction, or by committing a DecisionRecord that records the architecture decision; an inline note is a drafting placeholder and does not satisfy the requirement until it is committed as a DecisionRecord.
  appliesTo:
  - runtime_service
  applicability:
    anyOf:
    - field: capabilities
      contains: 01KT0XNZEY-A7GK
  canBeSatisfiedBy:
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KT0XNZEY-A7GK
    example: A TechnologyComponent configuration that implements the analytics platform.
  - mechanism: internalComponent
    criteria:
      capability: 01KT0XNZEY-A7GK
    example: A locally included TechnologyComponent that provides Analytics behavior.
  - mechanism: relationship
    criteria:
      capability: 01KT0XNZEY-A7GK
    example: A relationship to a modeled service that delivers Analytics behavior.
  - mechanism: decisionRecord
    criteria:
      capability: 01KT0XNZEY-A7GK
    example: 'A committed DecisionRecord, referenced from decisionRecords with capability: 01KT0XNZEY-A7GK, recording how Analytics is delivered or why it is not required.'
  minimumSatisfactions: 1
  relatedCapability: 01KT0XNZEY-A7GK
  requirementMode: conditional
  naAllowed: true
  validAnswerTypes:
  - technologyComponentConfiguration
  - internalComponent
  - relationship
  - decisionRecord
