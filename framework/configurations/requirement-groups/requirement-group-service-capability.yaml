schemaVersion: '1.0'
uid: 01KT0VM061-CRN7
type: requirement_group
name: Service Capability RequirementGroup
description: >
  Self-declared capability requirements for shared service objects. When a RuntimeService,
  DataStoreService, or NetworkService declares a native DRAFT capability in its capabilities
  list, the matching requirement here demands that the service document how that capability is
  delivered and ties it to an approved TechnologyComponent. Every requirement is conditional on
  the service self-declaring the capability, so services that do not provide a capability are
  never asked about it. This group applies across all delivery models.
version: 1.0.0
catalogStatus: complete
authority:
  name: DRAFT Framework
  shortName: DRAFT
  source: DRAFT Framework
activation: always
appliesTo:
- runtime_service
- data_store_service
- network_service
requirements:
- id: capability-api-gateway
  name: API Gateway behavior
  description: A network service that declares the API Gateway capability must document how inbound API routing, authentication, rate limiting, and transformation are delivered.
  rationale: API Gateway is a declared native capability; documenting how a declared capability is delivered keeps it auditable and resolvable to an approved TechnologyComponent.
  appliesTo:
  - network_service
  applicability:
    anyOf:
    - field: capabilities
      contains: 01KT0V5MCV-3A6F
  canBeSatisfiedBy:
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KT0V5MCV-3A6F
    example: A TechnologyComponent configuration that implements the API gateway.
  - mechanism: internalComponent
    criteria:
      capability: 01KT0V5MCV-3A6F
    example: A locally included TechnologyComponent that provides API gateway behavior.
  - mechanism: relationship
    criteria:
      capability: 01KT0V5MCV-3A6F
    example: A relationship to a modeled service that delivers API gateway behavior.
  - mechanism: architectureNote
    key: apiGatewayApproach
    example: A documented description of how API traffic is routed, authenticated, and shaped.
  minimumSatisfactions: 1
  relatedCapability: 01KT0V5MCV-3A6F
  requirementMode: conditional
  naAllowed: true
  validAnswerTypes:
  - technologyComponentConfiguration
  - internalComponent
  - relationship
  - architectureNote
