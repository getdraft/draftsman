schemaVersion: '1.0'
uid: 01KQQ4Q027-K5DR
type: requirement_group
name: Service Behavior Requirement Group
description: Structured checklist of required questions and answers used to define complete and correct self-managed Runtime and Edge/Gateway Services; Data-at-Rest Services inherit these service behavior requirements.
version: 3.0.0
catalogStatus: complete
owner:
  team: cloud-architecture
  contact: cloud-architecture@example.com
authority:
  name: DRAFT Framework
  shortName: DRAFT
  source: DRAFT Framework
activation: always
appliesTo:
- runtime_service
- edge_gateway_service
appliesToQualifiers:
  deliveryModel: self-managed
requirements:
- id: runtime-substrate
  description: A self-managed service must reference the Host Standard that provides its execution substrate.
  rationale: A service is not deployable until the host substrate is explicit; the Draftsman must not assume EKS, EC2, Lambda, VM, physical, or container placement without source evidence or user confirmation.
  canBeSatisfiedBy:
  - mechanism: field
    key: host
    example: Reference an approved Host Standard such as Windows Server on EC2, Amazon Linux on EC2, Ubuntu on EC2, EKS container host, or another workspace-defined Host.
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - field
- id: primary-technology-component
  description: A self-managed service must reference the primary Technology Component that provides its runtime, gateway, or data-service function.
  rationale: A service is not complete until the product or component that performs the service function is explicit.
  canBeSatisfiedBy:
  - mechanism: field
    key: primaryTechnologyComponent
    example: Reference the main Technology Component such as IIS, SQL Server, NGINX, Java, or another workspace-defined component.
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - field
- id: service-authentication
  description: The service must address how service identities or administrators authenticate to the service.
  rationale: A service is incomplete until its service-level authentication model is explicit.
  canBeSatisfiedBy:
  - mechanism: externalInteraction
    criteria:
      capability: 01KQQ4Q026-MHJM
    example: Centralized identity or authentication service used by the workload.
  - mechanism: internalComponent
    criteria:
      capability: 01KQQ4Q026-MHJM
    example: A function Technology Component or installed component that provides the service authentication capability.
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KQQ4Q026-MHJM
    example: A named configuration on the function Technology Component that defines the service authentication model.
  - mechanism: architectureNote
    key: serviceAuthentication
    example: A documented service authentication pattern when the implementation is not expressed directly.
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architectureNote
  - externalInteraction
  - internalComponent
  - technologyComponentConfiguration
- id: secrets-management
  description: The service must address how service-level secrets, keys, tokens, or certificates are stored and accessed.
  rationale: Secret handling is a baseline service capability and cannot be left implicit.
  canBeSatisfiedBy:
  - mechanism: externalInteraction
    criteria:
      capability: 01KQQ4Q026-DTJJ
    example: A secrets platform or certificate-management service used by the workload.
  - mechanism: internalComponent
    criteria:
      capability: 01KQQ4Q026-DTJJ
    example: A component that locally provides the service secrets-management behavior.
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KQQ4Q026-DTJJ
    example: A function Technology Component configuration that defines how service secrets are sourced.
  - mechanism: architectureNote
    key: secretsManagement
    example: A documented statement of the service-level secrets pattern.
  minimumSatisfactions: 1
  relatedCapability: 01KQQ4Q026-DTJJ
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architectureNote
  - externalInteraction
  - internalComponent
  - technologyComponentConfiguration
- id: service-logging
  description: The service must address how service-generated logs are produced and delivered beyond host-level logging.
  rationale: Service logs are distinct from host logs and are required for supportability and evidentiary review.
  canBeSatisfiedBy:
  - mechanism: externalInteraction
    criteria:
      capability: 01KQQ4Q026-D04B
    example: A modeled central logging Runtime Service, Edge/Gateway Service, PaaS-delivered service, or SIEM platform referenced by externalInteractions.ref.
  - mechanism: internalComponent
    criteria:
      capability: 01KQQ4Q026-D04B
    example: A local logging component that handles service log forwarding or collection.
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KQQ4Q026-D04B
    example: A function Technology Component configuration that defines service log collection and export.
  - mechanism: architectureNote
    key: serviceLogging
    example: A documented service logging pattern when modeled indirectly.
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architectureNote
  - externalInteraction
  - internalComponent
  - technologyComponentConfiguration
- id: health-welfare-monitoring
  description: The service must address how operators observe service health, welfare, and operational telemetry.
  rationale: A service is incomplete until the monitoring pattern for service-level health is explicit.
  canBeSatisfiedBy:
  - mechanism: externalInteraction
    criteria:
      capability: 01KQQ4Q026-98VD
    example: Centralized monitoring platform used for service telemetry and health evaluation.
  - mechanism: internalComponent
    criteria:
      capability: 01KQQ4Q026-98VD
    example: A component that exports service health and operational telemetry.
  - mechanism: technologyComponentConfiguration
    criteria:
      capability: 01KQQ4Q026-98VD
    example: A function Technology Component configuration that enables service-level health telemetry.
  - mechanism: architectureNote
    key: healthWelfareMonitoring
    example: A documented monitoring and telemetry approach for the service.
  minimumSatisfactions: 1
  relatedCapability: 01KQQ4Q026-98VD
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architectureNote
  - externalInteraction
  - internalComponent
  - technologyComponentConfiguration
- id: availability
  description: The service must state its availability model.
  rationale: Availability cannot be inferred from a service name or topology and must be explicitly declared.
  canBeSatisfiedBy:
  - mechanism: deploymentConfiguration
    criteria:
      quality: availability
    example: A high-availability deployment configuration on the Runtime or Edge/Gateway Service.
  - mechanism: architectureNote
    key: availabilityModel
    example: A documented statement of the service availability model.
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architectureNote
  - deploymentConfiguration
- id: scalability
  description: The service must state its scalability model.
  rationale: Architects must make the capacity growth pattern explicit for each service.
  canBeSatisfiedBy:
  - mechanism: deploymentConfiguration
    criteria:
      quality: scalability
    example: An autoscaling deployment configuration on the Runtime or Edge/Gateway Service.
  - mechanism: architectureNote
    key: scalabilityModel
    example: A documented statement of the service scalability model.
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architectureNote
  - deploymentConfiguration
- id: recoverability
  description: The service must state its recoverability model.
  rationale: Service recovery behavior must be explicit so operators know how the service returns to function after failure.
  canBeSatisfiedBy:
  - mechanism: deploymentConfiguration
    criteria:
      quality: recoverability
    example: A deployment configuration that captures failover or restoration behavior.
  - mechanism: architectureNote
    key: recoverabilityModel
    example: A documented statement of the service recovery model.
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architectureNote
  - deploymentConfiguration
- id: failure-domain
  description: The service must state its failure domain.
  rationale: A service is incomplete until the scope of impact from its failure is explicit.
  canBeSatisfiedBy:
  - mechanism: architectureNote
    key: failureDomain
    example: A documented description of the service failure domain, such as per host, per shard, or shared across products.
  minimumSatisfactions: 1
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - architectureNote
lifecycleStatus: existing-only
tags:
- service
- requirement-group
- definition
