schemaVersion: '1.0'
uid: 01KQQ4Q027-TPWG
type: requirement_group
name: PaaS Delivery RequirementGroup
description: Structured requirements used when a Runtime, Data Store, or NetworkService is vendor-managed inside the organization's cloud boundary.
version: 1.0.0
catalogStatus: complete
authority:
  name: DRAFT Framework
  shortName: DRAFT
  source: DRAFT Framework
activation: always
appliesTo:
- runtime_service
- data_store_service
- network_service
requirements:
- id: function
  description: What capability does this PaaS service provide?
  rationale: The capability is the core reason the service exists.
  canBeSatisfiedBy:
  - mechanism: field
    key: capabilities
    example: 'capabilities: [data-persistence]'
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - field
  minimumSatisfactions: 1
- id: resilience-model
  description: "What is the resilience model of this service \u2014 is it inherently highly available within the region, or does it require multi-region config?\n"
  rationale: Adopters must know the managed availability baseline.
  canBeSatisfiedBy:
  - mechanism: decisionRecord
    key: resilienceModel
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: resilienceModel, recording this decision (or why it is not applicable).'
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - decisionRecord
  minimumSatisfactions: 1
- id: authentication-model
  description: How is access to this service authenticated?
  rationale: Defines the identity and security integration, for example IAM.
  canBeSatisfiedBy:
  - mechanism: field
    key: authenticationModel
    example: 'authenticationModel: iam'
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - field
  minimumSatisfactions: 1
- id: configurable-surface
  description: What configuration surface does the organization control?
  rationale: Captures the customer-managed portion of the managed platform.
  canBeSatisfiedBy:
  - mechanism: decisionRecord
    key: configurableSurface
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: configurableSurface, recording this decision (or why it is not applicable).'
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - decisionRecord
  minimumSatisfactions: 1
- id: failure-domain
  description: What is the failure domain of this platform dependency?
  rationale: Required to understand the blast radius of a vendor-managed outage.
  canBeSatisfiedBy:
  - mechanism: decisionRecord
    key: failureDomain
    example: 'A committed DecisionRecord, referenced from decisionRecords with key: failureDomain, recording this decision (or why it is not applicable).'
  requirementMode: mandatory
  naAllowed: false
  validAnswerTypes:
  - decisionRecord
  minimumSatisfactions: 1
lifecycleStatus: preferred
tags:
- paas
- requirement-group
- definition
appliesToQualifiers:
  deliveryModel: paas
